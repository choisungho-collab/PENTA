name: Build PENTA EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-recorder.txt
          pip install pyinstaller

      - name: Build (onefile)
        run: >
          pyinstaller --onefile --windowed --name penta_recorder --noupx
          --add-data "web;web"
          --add-data "fonts;fonts"
          --hidden-import psutil --hidden-import requests --hidden-import tkinter
          --hidden-import windows_capture --hidden-import pyaudiowpatch
          --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL.Image
          --collect-all windows_capture
          --exclude-module cv2 --exclude-module opencv-python --exclude-module matplotlib
          penta_recorder.py

      - name: Package exe as zip
        run: Compress-Archive -Path dist\penta_recorder.exe -DestinationPath penta_recorder.zip -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: penta_recorder-windows
          path: penta_recorder.zip

      - name: Publish Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: penta_recorder.zip
          make_latest: true
          body: |
            penta_recorder.zip 을 받아 압축을 풀면 penta_recorder.exe 파일 하나만 나옵니다(폴더 없음). 그 exe 를 더블클릭하세요 — 파이썬 설치 불필요.
            최초 실행 시 영상 도구(ffmpeg)를 한 번 자동으로 내려받습니다(1~2분). 클라우드 연결·전적 분석·업로드는 기본 설정으로 자동 동작합니다.
