name: Build PENTA EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-recorder.txt
          pip install pyinstaller

      - name: Build (onefile)
        run: >
          pyinstaller --onefile --windowed --name penta_recorder --noupx
          --add-data "web;web"
          --hidden-import psutil --hidden-import requests --hidden-import tkinter
          --hidden-import windows_capture --hidden-import pyaudiowpatch
          --collect-all windows_capture
          --hidden-import boto3 --hidden-import botocore --collect-data botocore
          penta_recorder.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: penta_recorder-windows
          path: dist\penta_recorder.exe

      - name: Publish Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\penta_recorder.exe
          make_latest: true
          body: |
            penta_recorder.exe 를 받아서 더블클릭하세요 — 파이썬 설치 불필요.
            같은 폴더에 config.json 을 넣어야 분석·업로드가 연결됩니다.
            최초 실행 시 영상 도구(ffmpeg)를 한 번 자동으로 내려받습니다(1~2분).
