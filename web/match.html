<style>
:root{
 --bg:#080A0E;--surface:#0F131A;--surface2:#161B23;--hover:#1C2530;--well:#0B0E13;
 --ink:#ECE7DD;--ink2:#C2BBAD;--dim:#867F71;--faint:#6B6355;
 --line:#1F252E;--line2:#2B323C;
 --gold:#DEC79C;--gold-ink:#EFDDBC;--gold-soft:rgba(222,199,156,.11);--gold-line:rgba(222,199,156,.32);
 --win:#52C3AC;--win-soft:rgba(82,195,172,.12);--win-line:rgba(82,195,172,.42);
 --loss:#DE7480;--loss-soft:rgba(222,116,128,.12);--loss-line:rgba(222,116,128,.42);
 --blue:#3D9BE0;--blue-soft:rgba(61,155,224,.1);--blue-line:rgba(61,155,224,.34);
 --red:#E0563D;--red-soft:rgba(224,86,61,.1);--red-line:rgba(224,86,61,.34);
 --fd:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
 --fs:'Chakra Petch','Saira','Pretendard Variable',sans-serif;
 --fg:'Sora',sans-serif;
 --fm:'IBM Plex Mono',ui-monospace,monospace;
 --r1:10px;--r2:14px;--r3:18px;--sh:0 18px 44px -22px rgba(0,0,0,.8);
}
*{box-sizing:border-box}html,body{margin:0;overflow-x:clip}
body{background:radial-gradient(70% 55% at 15% 4%,rgba(222,199,156,.12),transparent 55%),radial-gradient(65% 60% at 92% 16%,rgba(78,168,205,.12),transparent 58%),radial-gradient(85% 65% at 50% 116%,rgba(130,115,205,.12),transparent 62%),#0A0D13;background-attachment:fixed;color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}svg{display:block}img{display:block;max-width:100%}
.ic{width:1em;height:1em;flex-shrink:0}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}
.wrap{max-width:1160px;margin:0 auto;padding:0 24px 110px}

.bar{position:sticky;top:0;z-index:50;background:rgba(8,10,14,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.bar-in{max-width:1160px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .mk{width:22px;height:22px;color:var(--gold);filter:drop-shadow(0 0 9px rgba(222,199,156,.4))}
.brand b{font-family:var(--fg);font-weight:600;font-size:20px;letter-spacing:.15em;color:var(--gold)}
.nav{display:flex;gap:2px;margin-left:14px}
.nav a{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--dim);padding:7px 9px 9px;border-bottom:2px solid transparent;transition:.14s}
.nav a:hover{color:var(--ink)}
.nav a.on{color:var(--ink);border-bottom-color:var(--gold)}
.bar .sp{flex:1}

/* мҳҒмғҒ л¬ҙлҢҖ */
.player{margin:22px 0 0}
.manage{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0 0;padding:10px 12px;background:var(--surface2,#161B23);border:1px solid var(--line,#1F252E);border-radius:14px}
.manage .ml{font-size:12px;font-weight:600;color:var(--gold,#DEC79C);flex:0 0 auto;letter-spacing:.02em}
.manage input{flex:1 1 200px;min-width:150px;background:var(--well,#0B0E13);border:1px solid var(--line2,#2B323C);border-radius:9px;color:var(--ink,#ECE7DD);font-size:13px;padding:9px 11px}
.manage input:focus{outline:none;border-color:var(--gold-line,rgba(222,199,156,.32))}
.manage .mbtn{flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--bg,#080A0E);background:var(--gold,#DEC79C);border:0;border-radius:9px;padding:9px 13px;cursor:pointer}
.manage .mbtn:hover{filter:brightness(1.05)}
.manage .mbtn.del{color:#DE7480;background:none;border:1px solid rgba(222,116,128,.5)}
.manage .mbtn.del:hover{background:rgba(222,116,128,.1)}
.manage .mmsg{font-size:12px;flex:0 0 auto}
.manage .mmsg.ok{color:#52C3AC}
.manage .mmsg.err{color:#DE7480}
.stage{position:relative;background:#05080b;border:1px solid var(--line);border-radius:0;overflow:hidden;aspect-ratio:16/9}
/* к°Ғм§„ мӮ¬к°Ғнҳ•: л‘Ҙк·ј лӘЁм„ңлҰ¬(18px)к°Җ кІҢмһ„ нҷ”л©ҙ кө¬м„қ м •ліҙ(FPSВ·лҜёлӢҲл§өВ·мҠӨмҪ”м–ҙліҙл“ң лӘЁм„ңлҰ¬)лҘј к°ҖлҰ¬лҠ” л¬ём ң н•ҙкІ° */
.stage video{width:100%;height:100%;object-fit:contain;background:#05080b;display:block}
.stage.empty{display:grid;place-items:center}
.stage .novid{text-align:center;color:var(--faint);font-family:var(--fd);font-size:14px;padding:24px}
.stage .novid .mk{width:46px;height:46px;color:var(--line2);margin:0 auto 14px}
/* мӢңм җ н’Җ(мҰүмӢң м „нҷҳ) */
.stage.pool{position:relative}
.stage.pool .pvid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#05080b;opacity:0;z-index:1;pointer-events:none;transition:opacity .1s linear}
#stagehost.director .stage.pool .pvid{transition:opacity .45s ease}
.stage.pool .pvid.on{opacity:1;z-index:2;pointer-events:auto}
/* м „нҷҳ: лӮҳк°ҖлҠ” мҳҒмғҒ(leaving)мқҖ л¶ҲнҲ¬лӘ…н•ҳкІҢ нҷ”л©ҙмқ„ кі„мҶҚ мұ„мҡ°л©° м•„лһҳ(z-index 1)м—җ к№”лҰ¬кі ,
   target мқҙ мң„(z-index 3)м—җм„ң нҺҳмқҙл“ңмқё вҶ’ м–ҙлҠҗ мҲңк°„м—җлҸ„ мөңмҶҢ н•ң мһҘмқҙ л¶ҲнҲ¬лӘ…н•ҙ 'кІҖмқҖ нҷ”л©ҙ'мқҙ м—ҶлӢӨ. */
.stage.pool .pvid.on.leaving{opacity:1;z-index:1}
.stage.pool .pvid.on.entering{z-index:3}
.stage.pool .poolempty{position:absolute;inset:0;display:none;place-items:center;background:#05080b;z-index:3}
.stage.pool .poolempty.on{display:grid}
.stage.pool .vspin{position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px 0 0 -17px;border:3px solid rgba(236,231,221,.16);border-top-color:var(--gold);border-radius:50%;z-index:4;display:none;animation:vspin .8s linear infinite;pointer-events:none}
.stage.pool.loading .vspin{display:block}
@keyframes vspin{to{transform:rotate(360deg)}}
/* л¶„н•  л Ҳмқҙм•„мӣғ */
.stage.grid{display:grid;gap:2px;background:var(--line);aspect-ratio:auto}
.stage.grid .cell{aspect-ratio:16/9}   /* к°Ғ м…Җмқ„ 16:9лЎң вҶ’ лӮҳлһҖнһҲ ліј л•Ң л Ҳн„°л°•мҠӨ м ңкұ°(мҠӨн…Ңмқҙм§Җ лҶ’мқҙлҠ” м…Җм—җ л§һм¶° лҠҳм–ҙлӮЁ) */
.stage.mv-2{grid-template-columns:1fr 1fr}
.stage.mv-3{grid-template-columns:1fr 1fr}
.stage.mv-3 .cell:first-child{grid-column:1/-1}
.stage.mv-4{grid-template-columns:1fr 1fr}
.stage .cell{position:relative;background:#05080b;overflow:hidden;min-height:0}
.stage .cell video{width:100%;height:100%;object-fit:contain;background:#05080b;transform:translateZ(0);image-rendering:auto;backface-visibility:hidden}
/* к°Ғ м…Җ мҳҒмғҒмқ„ к°ңлі„ GPU л Ҳмқҙм–ҙлЎң мҠ№кІ©(translateZ) вҶ’ лҸҷмӢң л””мҪ”л”©В·н•©м„ұ л¶Җн•ҳ л¶„мӮ°, нҷ•лҢҖ мӢң м•„нӢ°нҢ©нҠё к°җмҶҢ */
.stage .cell .tag{position:absolute;left:8px;top:8px;font-family:var(--fd);font-size:11px;font-weight:600;color:#fff;background:rgba(5,8,11,.78);padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:5px;z-index:2}
.stage .cell .tag i{width:8px;height:8px;border-radius:50%}
/* нҸ¬м»ӨмҠӨ(л©”мқё+PiP) */
.piprow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.pipcell{position:relative;aspect-ratio:16/9;background:#05080b;border:1px solid var(--line);border-radius:var(--r1);overflow:hidden;cursor:pointer;transition:.14s}
.pipcell:hover{border-color:var(--gold-line)}
.pipcell video{width:100%;height:100%;object-fit:cover}
.pipcell .tag{font-size:10px;padding:2px 6px}
.pipcell .promote{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,8,11,.42);opacity:0;transition:.14s;color:var(--gold-ink)}
.pipcell .promote svg{width:22px;height:22px}
.pipcell:hover .promote{opacity:1}
.stage.grid .cell.zoomable{cursor:pointer}
.stage.focusmain{position:relative;cursor:pointer}
.cell .ovl,.stage.focusmain .ovl{position:absolute;top:8px;right:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(5,8,11,.6);border:1px solid var(--line2);border-radius:8px;color:#fff;opacity:0;transition:.14s;z-index:3;pointer-events:none}
.cell .ovl svg,.stage.focusmain .ovl svg{width:16px;height:16px}
.cell.zoomable:hover .ovl,.stage.focusmain:hover .ovl{opacity:.95}
/* л¶„н•  л Ҳмқҙм•„мӣғ нҶ кёҖ */
.lmode{display:inline-flex;gap:3px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:3px}
.lmode button{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);background:none;border:0;border-radius:7px;padding:7px 9px;cursor:pointer;transition:.14s}
.lmode button:hover{color:var(--ink)} .lmode button.on{background:var(--gold-soft);color:var(--gold-ink)}
.lmode button svg{width:14px;height:14px}

/* POV л°” (м–јкөҙл§Ң) */
.povbar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.povlab{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);flex:0 0 auto}
.povtabs{display:flex;gap:11px;flex-wrap:wrap}
.povtab{position:relative;display:block;padding:0;border:0;background:none;cursor:pointer;line-height:0}
.povtab img,.povtab .ph{display:block;width:46px;height:46px;border-radius:12px;border:1px solid var(--line2);background:var(--well);object-fit:cover;opacity:.9;filter:grayscale(.08);transition:.16s}
.povtab:hover img,.povtab:hover .ph{opacity:1;border-color:var(--gold-line)}
.povtab.on img,.povtab.sel img,.povtab.on .ph,.povtab.sel .ph{opacity:1;filter:none;border-color:var(--tc);box-shadow:0 0 0 2px var(--tc),0 8px 18px -10px color-mix(in srgb,var(--tc) 55%,transparent)}
.povtab.novid{cursor:default}
.povtab .nov{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);font-family:var(--fm);font-size:8px;font-weight:600;color:var(--dim);background:var(--well);border:1px solid var(--line);border-radius:5px;padding:1px 5px;white-space:nowrap;line-height:1.3}
.splitbtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:13px;color:var(--ink);background:var(--surface2);border:1px solid var(--line2);padding:9px 14px;border-radius:var(--r1);cursor:pointer;transition:.14s;white-space:nowrap;margin-left:auto}
.splitbtn:hover{border-color:var(--line2);color:var(--ink)}
.splitbtn.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.splitbtn .ic{width:15px;height:15px}
.splithint{font-family:var(--fd);font-size:12px;color:var(--dim);width:100%}
.vmode{display:inline-flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:3px;margin-left:auto}
.vmode button{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);background:none;border:0;border-radius:7px;padding:7px 12px;cursor:pointer;transition:.14s;white-space:nowrap}
.vmode button:hover{color:var(--ink)}
.vmode button.on{background:var(--gold);color:var(--bg)}
.vmode button svg{width:14px;height:14px}
.vmode.vsub{margin-left:6px}
.vmode.vsub button{padding:7px 9px}
.povtab .ord{position:absolute;top:-7px;right:-7px;min-width:17px;height:17px;padding:0 3px;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;font-weight:700;color:var(--bg);background:var(--tc);border-radius:9px;line-height:1;z-index:3}
@media(max-width:560px){.vmode button span{display:none}.vmode button{padding:8px 10px}}

/* мҡ”м•Ҫ л°” */
.summary{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 20px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.summary .verdict{font-family:var(--fs);font-weight:400;font-size:26px;letter-spacing:.01em;padding-right:22px;border-right:1px solid var(--line)}
.summary .verdict.w{color:var(--win);text-shadow:0 0 22px rgba(82,195,172,.3)}.summary .verdict.l{color:var(--loss);text-shadow:0 0 22px rgba(224,107,107,.22)}
.summary .si{display:flex;flex-direction:column;gap:4px}
.summary .si .k{font-family:var(--fd);font-size:11px;color:var(--dim);letter-spacing:.02em}
.summary .si .v{font-family:var(--fm);font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
.summary .sp{flex:1}
.summary .acts{display:flex;align-items:center;gap:9px}
.actbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--ink2);background:var(--well);border:1px solid var(--line);padding:6px 11px;border-radius:var(--r1);cursor:pointer;transition:.14s;font-variant-numeric:tabular-nums}
.actbtn:hover{border-color:var(--line2);color:var(--ink)}
.actbtn.liked{color:var(--loss);border-color:var(--loss-line);background:var(--loss-soft)}
.actbtn .ic{width:15px;height:15px}
.actbtn.view{cursor:default}

h2.sec{font-family:var(--fs);font-weight:400;font-size:20px;letter-spacing:.02em;color:var(--ink);margin:34px 0 14px;display:flex;align-items:center;gap:11px}
h2.sec .ln{flex:1;height:1px;background:var(--line)}

/* кіЁл“ң к·ёлһҳн”„ */
.chartcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 18px 12px}
.chartcard .lg{display:flex;align-items:center;gap:18px;margin-bottom:6px;font-family:var(--fd);font-size:12.5px;color:var(--dim)}
.chartcard .lg i{display:inline-block;width:18px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
.chartcard svg{width:100%;height:auto;display:block;overflow:visible}
.chartcard .gx{font-family:var(--fm);font-size:10px;fill:var(--faint)}

/* мҳӨлёҢм қнҠё */
.objgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px 16px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:16px 22px}
.objgrid .ot{font-family:var(--fd);font-size:12.5px;color:var(--dim);text-align:center;letter-spacing:.02em}
.objgrid .ov{font-family:var(--fm);font-size:16px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px}
.objgrid .ov.b{color:var(--blue);justify-content:flex-end}
.objgrid .ov.r{color:var(--red)}
.objgrid .ov .ic{width:15px;height:15px;opacity:.85}
.objgrid .ov b{font-weight:600}.objgrid .ov.lead b{color:var(--gold-ink)}

/* мҠӨмҪ”м–ҙліҙл“ң */
.board{display:flex;flex-direction:column;gap:16px}
.team{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden}
.team.blue{border-top:2px solid var(--blue-line)}
.team.red{border-top:2px solid var(--red-line)}
.thead{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.thead .tn{font-family:var(--fs);font-weight:700;font-size:28px;letter-spacing:.03em;line-height:1}
.team.blue .thead .tn{color:var(--blue)}.team.red .thead .tn{color:var(--red)}
.thead .wl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:6px}
.thead .wl.w{color:var(--win);background:var(--win-soft);border:1px solid var(--win-line)}
.thead .wl.l{color:var(--loss);background:var(--loss-soft);border:1px solid var(--loss-line)}
.thead .wl.u{color:var(--dim);background:rgba(150,150,160,.1);border:1px solid var(--line2)}
.thead .tstats{font-family:var(--fm);font-size:13px;color:var(--ink2);font-variant-numeric:tabular-nums;display:flex;gap:14px}
.thead .tstats b{color:var(--ink);font-weight:600}
.thead .sp{flex:1}
.thead .bans{display:flex;align-items:center;gap:5px}
.thead .bans .bl{font-family:var(--fd);font-size:10.5px;color:var(--dim);margin-right:2px}
.thead .bans img{width:22px;height:22px;border-radius:5px;filter:grayscale(.55) brightness(.8);border:1px solid var(--line2)}

.prow{display:grid;grid-template-columns:auto auto 1fr auto auto auto auto;gap:12px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:0}

@keyframes starPulse{0%,100%{opacity:.55;filter:drop-shadow(0 0 6px rgba(222,199,156,.2))}50%{opacity:1;filter:drop-shadow(0 0 18px rgba(222,199,156,.5))}}
/* мҪҳн…җмё  л“ұмһҘ: лЎңл”© лҒқлӮҳкі  мҳҒмғҒ+мҡ”м•Ҫмқҙ л¶Җл“ңлҹҪкІҢ лӮҳнғҖлӮЁ */
@keyframes matchIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* мҠӨнҒ¬лЎӨ лҰ¬л№Ң: м•„лһҳ м„№м…ҳл“Өмқҙ л·°нҸ¬нҠём—җ л“Өм–ҙмҳ¬ л•Ң л¶Җл“ңлҹҪкІҢ л– мҳӨлҰ„(2025 нҠёл Ңл“ң, м„ұлҠҘ м•Ҳм „) */

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җ LCKмӢқ л¶„м„қ лҢҖмӢңліҙл“ң в•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.lck{position:relative;background:radial-gradient(rgba(255,255,255,.018) 1px,transparent 1.4px) 0 0/22px 22px,radial-gradient(88% 55% at 50% -8%,rgba(42,52,68,.5),transparent 58%),linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line2);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh);animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
.lck::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--blue),transparent 42%,var(--gold-line) 50%,transparent 58%,var(--red));opacity:.75;z-index:3}
/* н—ӨлҚ” */
.lckhead{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:26px;padding:24px 36px;background:linear-gradient(180deg,rgba(6,8,11,.55),rgba(6,8,11,0) 78%),radial-gradient(62% 150% at 10% 50%,rgba(61,155,224,.17),transparent 60%),radial-gradient(62% 150% at 90% 50%,rgba(224,86,61,.17),transparent 60%);border-bottom:1px solid var(--line2);box-shadow:0 16px 26px -20px rgba(0,0,0,.55)}
.lckhead::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(222,199,156,.42),transparent);pointer-events:none;z-index:3}
.lhside{position:relative;display:flex;flex-direction:column;gap:8px}
.lhside.blue{align-items:flex-end}.lhside.red{align-items:flex-start}
.lhside.won::before{content:'';position:absolute;inset:-10px -18px;border-radius:12px;opacity:.08;z-index:0}
.lhside.blue.won::before{background:var(--blue)}.lhside.red.won::before{background:var(--red)}
.lhrow1{position:relative;z-index:1;display:flex;align-items:baseline;gap:15px}
.lhteam{font-family:var(--fs);font-weight:700;font-size:31px;letter-spacing:.02em;line-height:.9}
.lhside.blue .lhteam{color:#9CC9EE}.lhside.red .lhteam{color:#EFA593}
.lhsc{font-family:var(--fs);font-weight:600;font-size:41px;line-height:.85;color:var(--ink);font-variant-numeric:tabular-nums}
.lhwl{position:relative;z-index:1;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.2em}
.lhwl.win{color:var(--gold-ink)}.lhwl.loss{color:var(--dim)}
.lhtime{text-align:center;padding:0 6px}
.lhtv{font-family:var(--fs);font-size:35px;font-weight:600;color:var(--gold-ink);font-variant-numeric:tabular-nums;line-height:.9;text-shadow:0 0 18px rgba(222,199,156,.3)}
.lhtl{font-family:var(--fm);font-size:9px;letter-spacing:.24em;color:var(--dim);margin-top:6px}
/* ліёл¬ё 2лӢЁ */
.lckgrid{display:grid;grid-template-columns:1fr 1.52fr}
@media(max-width:860px){.lckgrid{grid-template-columns:1fr}}
.lckL{padding:18px 26px 20px;border-right:1px solid var(--line)}
@media(max-width:860px){.lckL{border-right:0;border-bottom:1px solid var(--line)}}
.lckone{padding:20px 26px 22px;max-width:560px;margin:0 auto}
.lckR{display:flex;flex-direction:column;min-width:0}
.lckpanel{padding:18px 26px 16px;min-width:0}
.lckpanel+.lckpanel{border-top:1px solid var(--line)}
.lcktt{display:flex;align-items:center;justify-content:center;gap:13px;font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.2em;color:var(--dim);margin-bottom:16px;text-transform:uppercase}
.lcktt::before,.lcktt::after{content:'';height:1px;flex:0 0 26px;background:linear-gradient(90deg,transparent,var(--line2))}
.lcktt::after{background:linear-gradient(270deg,transparent,var(--line2))}
/* кІҢмһ„ мҠӨнғҜ н–ү */
.srow{display:grid;grid-template-columns:1fr 104px 1fr;align-items:center;padding:11px 0;min-height:42px}
.srow+.srow{border-top:1px solid var(--line)}
.srow .sb,.srow .sr{font-family:var(--fs);font-size:18px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;display:flex;align-items:center;min-height:18px}
.srow .sb{justify-content:flex-end}.srow .sr{justify-content:flex-start}
.srow .sl{font-family:var(--fm);font-size:10px;font-weight:600;color:var(--ink2);white-space:nowrap;letter-spacing:.13em;text-transform:uppercase;text-align:center}
.srow.bl .sb{color:var(--gold-ink)}.srow.rl .sr{color:var(--gold-ink)}
.kdav{display:inline-flex;align-items:baseline;gap:4px}
.kdav i{font-style:normal;color:var(--faint);font-weight:400;font-size:.78em}
.srow .z{color:var(--faint);font-size:14px}
.ov{display:inline-flex;gap:5px;align-items:center}
.ov svg{width:20px;height:20px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))}
.ov.b svg{color:var(--blue)}.ov.r svg{color:var(--red)}
.ov.dr{gap:3px}
.dico{height:18px;width:auto;vertical-align:middle;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.rico{width:17px;height:17px;flex-shrink:0;opacity:.82;filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))}
span.rico{display:inline-block}
.ovnum{font-family:var(--fs);font-size:15px;font-weight:600;color:var(--ink2)}
.ovn{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--dim);margin:0 3px}
.bv{display:inline-flex;gap:4px;align-items:center}
.bv img{width:21px;height:21px;border-radius:5px;border:1px solid var(--line2);filter:grayscale(.5) brightness(.82);object-fit:cover}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ к°Җн•ң н”јн•ҙлҹү / CS (LCKмӢқ лӢӨмқҙлІ„м§• л°”) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.dmg{position:relative;display:grid;grid-template-columns:1fr 1fr;column-gap:26px}
.dmg::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
@media(max-width:480px){.dmg{grid-template-columns:1fr;column-gap:0}.dmg::after{display:none}.dcol{gap:9px}.dteamsep{display:flex;align-items:center;gap:9px;margin:12px 2px 4px;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.14em}.dteamsep .b{color:var(--blue)}.dteamsep .r{color:var(--red)}.dteamsep .vs{color:var(--faint);font-size:9px}.dteamsep::before,.dteamsep::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent)}}
.dcol{display:flex;flex-direction:column;gap:7px}
.drow{display:flex;align-items:center;gap:8px}

.dchamp{width:28px;height:28px;border-radius:6px;border:1px solid var(--line2);background:var(--well);object-fit:cover;flex-shrink:0}
.drow.me .dchamp{border-color:var(--gold-line);box-shadow:0 0 0 2px var(--gold-soft)}
.dnv{display:flex;flex-direction:column;justify-content:center;width:78px;min-width:78px;line-height:1.14;flex-shrink:0}
.dcol.blue .dnv{align-items:flex-start;text-align:left}.dcol.red .dnv{align-items:flex-end;text-align:right}
.dnv .dn{font-family:var(--fd);font-weight:600;font-size:10.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px}
.drow.me .dnv .dn{color:var(--gold-ink)}
.dnv .dv{font-family:var(--fs);font-weight:700;font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.004em}
.dtrack{flex:1;min-width:0;height:8px;background:var(--well);border-radius:4px;overflow:hidden;display:flex;box-shadow:inset 0 1px 2px rgba(0,0,0,.35)}
.dcol.red .dtrack{justify-content:flex-end}
.dteamsep{display:none}
.dfill{height:100%;border-radius:4px;min-width:3px;transform-origin:left center;animation:dgrow .9s cubic-bezier(.2,.8,.25,1) both;position:relative}
.dcol.red .dfill{transform-origin:right center}
.dfill.b{background:linear-gradient(90deg,var(--blue),var(--blue-line))}
.dfill.r{background:linear-gradient(270deg,var(--red),var(--red-line))}
.dfill .dpre{position:absolute;top:0;bottom:0;left:0;background:rgba(255,255,255,.34);pointer-events:none}
.dcol.red .dfill .dpre{left:auto;right:0}
.dleg{display:flex;align-items:center;gap:7px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-family:var(--fs);font-size:10.5px;color:var(--faint);letter-spacing:.05em}
.dls{width:20px;height:8px;border-radius:3px;background:rgba(255,255,255,.34);flex-shrink:0}
@keyframes dgrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ кіЁл“ң м°Ёмқҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.gdc .lg{display:flex;align-items:center;gap:14px;margin-bottom:8px;font-family:var(--fd);font-size:11px;color:var(--dim)}

.gdc .gdline{transition:stroke-dashoffset 1.2s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* мёЎм • м§Җн‘ң л“ұкёү */
.grade{display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--r2);padding:16px 20px;margin-bottom:12px}

/* мқҙлІҲ кІҢмһ„ н•өмӢ¬ н•ҳлӮҳ (мҪңм•„мӣғ) + лҚ°мҠӨ нқҗлҰ„ мҠӨнҠёлҰҪ */
.cfocus{display:flex;flex-direction:column;gap:5px;background:linear-gradient(180deg,var(--gold-soft),var(--surface));border:1px solid var(--gold-line);border-left:3px solid var(--gold);border-radius:var(--r2);padding:14px 18px;margin-bottom:12px}

.dflow .dfseg b{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.auth{display:flex;align-items:center;gap:8px;margin-left:10px;flex:0 0 auto}
.auth .me-link{font-family:var(--fd);font-weight:600;font-size:13px;color:var(--gold-ink);padding:5px 9px;border-radius:8px;border:1px solid var(--gold-line);background:var(--gold-soft);transition:.14s}
.auth .me-link:hover{filter:brightness(1.12)}
.auth .who{font-size:13px;font-weight:600;color:var(--gold);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== Chakra Petch лҰ¬нҢҢмқё + мўҢмҡ° мҠӨмҪ”м–ҙліҙл“ң ===== */
body{text-rendering:optimizeLegibility;-moz-osx-font-smoothing:grayscale}

.srow .sl{font-family:var(--fs);font-weight:500;font-size:11px;letter-spacing:.15em;color:var(--ink2);opacity:.74}
.lhtl{font-family:var(--fs);font-weight:500;letter-spacing:.24em}
.lhwl{font-family:var(--fs);font-weight:600;letter-spacing:.16em}
.lhteam{font-weight:700;letter-spacing:.012em}

.lhtv{font-weight:700;font-variant-numeric:tabular-nums}

.sb2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.sbcol.blue .tn{color:#9CC9EE}.sbcol.red .tn{color:#EFA593}

.sbhead .ts{margin-left:auto;display:flex;gap:11px;font-family:var(--fd);font-size:11px;color:var(--dim)}
.sbhead .ts b{font-family:var(--fs);font-weight:600;color:var(--ink2);font-variant-numeric:tabular-nums}
.prow2{display:flex;align-items:center;gap:10px;padding:11px 14px}

/* ===== л©ҖнӢ°л·°: м„ёлЎң(мҢ“кё°) + н•ӯмғҒ ліҙмқҙлҠ” м»ӨмҠӨн…Җ м»ЁнҠёлЎӨ л°” ===== */
.stage.grid.vert{grid-template-columns:1fr;grid-auto-rows:1fr;aspect-ratio:16/18;max-height:calc(100vh - 150px);margin-left:auto;margin-right:auto}

.mvbar{display:flex;align-items:center;gap:11px;margin-top:8px;padding:9px 13px;background:var(--surface);border:1px solid var(--line);border-radius:11px}
.mvbar .mvbtn{flex:0 0 auto;width:32px;height:32px;display:grid;place-items:center;background:var(--well);border:1px solid var(--line2);border-radius:8px;color:var(--ink2);cursor:pointer;padding:0;transition:border-color .14s,color .14s}
.mvbar .mvbtn:hover{color:var(--ink);border-color:var(--gold-line)}
.mvbar .mvbtn svg{width:16px;height:16px;display:block}
.mvbar .mvseek{flex:1 1 auto;min-width:0;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--line2);cursor:pointer;outline:none}

  // нӮ¬/лҚ°мҠӨ/мҳӨлёҢм қнҠё лІ„нҠј вҶ’ мҳҒмғҒ м җн”„. кІҢмһ„мӢңк°Ғ tлҘј к°Ғ мҳҒмғҒмқҳ (t - g0)лЎң ліҖнҷҳн•ҙ seek.
  // ліҙмқҙлҠ” мҳҒмғҒ м „л¶Җ(лӮҳлһҖнһҲ=лӘЁл“  м…Җ / лӢЁмқј=нҷңм„ұ мҳҒмғҒ)лҘј л§һм¶ҳлӢӨ. л©”нғҖлҚ°мқҙн„° лҜёлЎңл“ңл©ҙ лЎңл“ң нӣ„ seek,
  // мқјл¶Җ лёҢлқјмҡ°м ҖВ·мӣҗкІ© мҳҒмғҒмқҙ лЁј м§Җм җ seek м§Ғнӣ„ 0мңјлЎң лҗҳлҸҢм•„к°ҖлҠ” нҳ„мғҒмқҖ мһ¬нҷ•мқё лЈЁн”„лЎң ліөкө¬.
  function _seekVid(v, vt){
    if(!v || v._err) return 0;
    vt = Math.max(0, vt||0);
    var apply=function(){
      try{ var d=v.duration; if(isFinite(d)&&d>0.6) vt=Math.min(vt, d-0.3); v.currentTime=vt; }catch(_){}
    };
    if(v.readyState>=1 && isFinite(v.duration)) apply();
    else { try{v.load();}catch(_){}  v.addEventListener('loadedmetadata', apply, {once:true}); }
    return vt;
  }
  function jumpTo(gameT){
    var vids = split ? stageVideos() : (activeVideo()?[activeVideo()]:stageVideos());
    vids = vids.filter(function(v){ return v && !v._err; });
    if(!vids.length){ var fb=document.querySelector('#stagehost video'); if(fb) vids=[fb]; }
    if(!vids.length) return;
    var goals = vids.map(function(v){ return { v:v, t:_seekVid(v, gameT - vG0(v)) }; });
    vids.forEach(function(v){ var p=v.play&&v.play(); if(p&&p.catch)p.catch(function(){}); });
    var n=0; (function fix(){ n++;
      goals.forEach(function(g){ try{ if(g.t>1 && (g.v.currentTime||0) < g.t-1.5) g.v.currentTime=g.t; }catch(_){} });
      if(n<8) setTimeout(fix, 220);
    })();
    var ref=vids[0], y=ref.getBoundingClientRect().top+window.pageYOffset-64;
    window.scrollTo({top:y<0?0:y, behavior:'smooth'});
  }

    jumpTo(parseInt(b.getAttribute('data-jump'),10)||0);

  function seekRel(d){

  // в”Җв”Җ кіЁл“ң м°Ёмқҙ к·ёлһҳн”„ (кіЎм„  + кёҖлЎңмҡ° + к·ёлҰ¬л“ң + л§Ҳм»Ө/мЈјм„қ) в”Җв”Җ
  function smoothPath(pts){
    if(pts.length<2) return '';
    if(pts.length===2) return 'M'+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1)+' L'+pts[1].x.toFixed(1)+' '+pts[1].y.toFixed(1);
    var d='M'+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1);
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||pts[i+1];
      var c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      var c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      d+=' C'+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2.x.toFixed(1)+' '+p2.y.toFixed(1);
    }
    return d;
  }
  // кіЁл“ң м°Ёмқҙ(м¶”м •): м ҖмһҘлҗң нӮ¬В·м–ҙмӢңВ·мҳӨлёҢм қнҠё нғҖмһ„мҠӨнғ¬н”„лЎң лӢӨмӢң кі„мӮ°. ліҙмң  м•„мқҙн…ң к°Җм№ҳліҙлӢӨ мӢӨм ң мҡ°мң„лҘј мһҳ л°ҳмҳҒ(нӮ¬кіЁл“ңлҘј м•Ҳ м“°кі  л“Өкі  лӢӨлӢҲлҠ” мҠӨл…ёліј нҢҖ ліҙм •).
  function goldDiffSeries(){
    var byT=function(a,b){return a.t-b.t;};
    var players=ANALYSIS.players||[];
    function teamOf(pid){ var pp=players[pid-1]; return pp?pp.team:null; }
    function objGold(kind,sub){ var k=(kind||'').toUpperCase(), su=(sub||'').toUpperCase();
      if(k==='BARON_NASHOR'||k==='BARON') return 1400;
      if(k==='DRAGON') return su==='ELDER_DRAGON'?260:110;
      if(k==='RIFTHERALD'||k==='HERALD') return 150;
      if(k==='TOWER') return 250;
      if(k==='BUILDING'||k==='INHIBITOR') return 160;
      if(k==='ATAKHAN') return 200;
      return 0; }
    var evs=[];
    (ANALYSIS.kills||[]).forEach(function(e){
      if(!e || typeof e.t!=='number') return;
      var kt=teamOf(e.killer); if(kt===100||kt===200) evs.push({t:e.t, team:kt, g:300});
      (e.assists||[]).forEach(function(a){ var at=teamOf(a); if(at===100||at===200) evs.push({t:e.t, team:at, g:150}); });
    });
    (ANALYSIS.objs||[]).forEach(function(o){
      if(!o || typeof o.t!=='number') return;
      var g=objGold(o.kind,o.sub); if(g && (o.team===100||o.team===200)) evs.push({t:o.t, team:o.team, g:g});
    });
    if(!evs.length) return null;
    evs.sort(byT);
    var g100=0,g200=0, out=[{t:0,g100:0,g200:0}];
    evs.forEach(function(e){ if(e.team===100) g100+=e.g; else g200+=e.g; out.push({t:e.t,g100:g100,g200:g200}); });
    var dur=ANALYSIS.duration||0; if(dur>out[out.length-1].t) out.push({t:dur,g100:g100,g200:g200});
    return out.length>1?out:null;
  }

  // кі„лӢЁмӢқ мқҙлІӨнҠё мӢңлҰ¬мҰҲлҘј к· л“ұ мӢңк°„кІ©мһҗлЎң лҰ¬мғҳн”Ң нӣ„ мқҙлҸҷнҸүк·  вҶ’ кіЎм„ мқҙ л§ӨлҒ„лҹ¬мӣҢм§җ(кёүм җн”„ мҷ„нҷ”)
  function resampleSmooth(series, samples, win){
    var maxT=series[series.length-1].t||1;
    // к°Ғ мӢңм җ t мқҳ лҲ„м Ғ кіЁл“ңм°ЁлҘј кі„лӢЁ(step) ліҙк°„мңјлЎң лҪ‘кё°
    function diffAt(t){
      var lo=0;
      for(var i=0;i<series.length;i++){ if(series[i].t<=t) lo=i; else break; }
      var s=series[lo]; return (s.g100||0)-(s.g200||0);
    }
    var raw=[];
    for(var k=0;k<samples;k++){ var t=maxT*k/(samples-1); raw.push({t:t, d:diffAt(t)}); }
    // мқҙлҸҷнҸүк· (м–‘л°©н–Ҙ) вҖ” win мқҖ н•ңмӘҪ л°ҳкІҪ
    var out=[];
    for(var i=0;i<raw.length;i++){
      var a=Math.max(0,i-win), b=Math.min(raw.length-1,i+win), sum=0,n=0;
      for(var j=a;j<=b;j++){ sum+=raw[j].d; n++; }
      out.push({t:raw[i].t, d:sum/n});
    }
    return out;
  }

  function goldDiffChart(series){
    if(!series || series.length<2) return '';
    var W=1000, H=250, pad=12, padB=34, padT=14;

    // мӣҗліё мқҙлІӨнҠё мӢңлҰ¬мҰҲлҘј л§ӨлҒ„лҹҪкІҢ: 160 мғҳн”Ң + л°ҳкІҪ6 мқҙлҸҷнҸүк·  (м•Ҫ Вұ40мҙҲ м°Ҫ)
    var sm=resampleSmooth(series, 160, 6);
    var diffs=sm.map(function(s){ return s.d; });
    var maxUp=0, maxDn=0, exi=0, exv=0;
    diffs.forEach(function(d,i){ if(d>0) maxUp=Math.max(maxUp,d); else maxDn=Math.max(maxDn,-d); if(Math.abs(d)>Math.abs(exv)){ exv=d; exi=i; } });
    if(maxUp===0 && maxDn===0){ maxUp=maxDn=1; }
    var span=(maxUp+maxDn)||1, yBase=padT+(maxUp/span)*(H-padT-padB);
    function x(t){ return pad+(t/maxT)*(W-2*pad); }
    function y(d){ if(d>=0) return yBase-(maxUp?d/maxUp:0)*(yBase-padT); return yBase+(maxDn?(-d)/maxDn:0)*((H-padB)-yBase); }
    var pts=sm.map(function(s){ return {x:x(s.t), y:y(s.d)}; });

    var bf=(yBase/H*100).toFixed(2);

      var tt=e.t||0; if(tt>maxT) return;
      var ic=e.kind==='baron'?'B':e.kind==='dragon'?'D':e.kind==='riftHerald'?'H':''; if(!ic){ var k=(e.kind||'').toUpperCase(),s=(e.sub||'').toUpperCase(); ic=(k==='BARON_NASHOR'||k==='BARON')?'B':k==='DRAGON'?(s==='ELDER_DRAGON'?'E':'D'):(k==='RIFTHERALD'||k==='HERALD')?'H':k==='ATAKHAN'?'A':''; } if(!ic) return;
      var cx=x(tt).toFixed(1), cy=(H-13), col=e.team===100?'var(--blue)':e.team===200?'var(--red)':'var(--line2)';
      marks+='<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="var(--well)" stroke="'+col+'" stroke-width="1.4"/><text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" class="gm">'+ic+'</text>';
    });
    var anx=x(sm[exi].t).toFixed(1), any=y(exv).toFixed(1), anc=exv>=0?'var(--blue)':'var(--red)';
    var ann='<circle cx="'+anx+'" cy="'+any+'" r="4.5" fill="'+anc+'" stroke="var(--bg)" stroke-width="1.5"/>';

      +'<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
      +'<defs>'
        +'<linearGradient id="gdfill" x1="0" y1="0" x2="0" y2="1">'
          +'<stop offset="0%" stop-color="var(--blue)" stop-opacity="0.45"/>'
          +'<stop offset="'+bf+'%" stop-color="var(--blue)" stop-opacity="0.04"/>'

          target.classList.remove('entering');
        }catch(_){}
      }, _fadeMs);
    };
    if(needSeek || target.readyState<2){          // мғҲ мң„м№ҳлЎң м җн”„н–Ҳкұ°лӮҳ м•„м§Ғ лІ„нҚј м „ вҶ’ мӨҖл№„лҗҳл©ҙ м „нҷҳ(к·ёлҸҷм•Ҳ мқҙм „ нҷ”л©ҙ+мҠӨн”јл„Ҳ мң м§Җ)
      POOL.classList.add('loading');
      ['seeked','canplay','loadeddata'].forEach(function(ev){ target.addEventListener(ev, _swap, {once:true}); });
      if(target.requestVideoFrameCallback){ try{ target.requestVideoFrameCallback(function(){ _swap(); }); }catch(_){} }
      setTimeout(_swap, 1200);                     // нҸҙл°ұ: л„Ҳл¬ҙ мҳӨлһҳ кұёлҰ¬л©ҙ м „нҷҳ(мҠӨн”јл„Ҳк°Җ лІ„нҚјл§Ғ н‘ңмӢң)
    } else {                                       // мқҙлҜё мҳ¬л°”лҘё н”„л Ҳмһ„мқҙ л””мҪ”л“ңлҸј мһҲмқҢ(лҸҷкё° мһ¬мғқ мӨ‘) вҶ’ лӢӨмқҢ н”„л ҲмӢң н”„л Ҳмһ„м—җ л§һм¶° мҰүмӢң м „нҷҳ
      if(target.requestVideoFrameCallback){ try{ target.requestVideoFrameCallback(function(){ _swap(); }); }catch(_){} setTimeout(_swap, 100); }
      else { _swap(); }
    }
  }

  function startSync(){
    if(syncRAF){ cancelAnimationFrame(syncRAF); syncRAF=null; }
    function loop(){
      if(performance.now() < _seekLock){ syncRAF=requestAnimationFrame(loop); return; }   // мӢңнҒ¬ м •м°© мӨ‘м—” көҗм • мғқлһө
      var a=activeVideo();
      if(a){
        var base=a.currentTime||0, ga=vG0(a);
        stageVideos().forEach(function(v){
          if(v!==a && !v._err && !v.paused){
            var want=base+(ga-vG0(v)); if(want<0) want=0;
            if(Math.abs((v.currentTime||0)-want)>0.28){ try{v.currentTime=want;}catch(_){} }
          }
        });
        // в”Җв”Җ к°җлҸ…нҢҗ: нҳ„мһ¬ кІҢмһ„мӢңк°„м—җ л§һлҠ” мӢңм җмңјлЎң мһҗлҸҷ м „нҷҳ в”Җв”Җ
        if(director && !split && _dirSched && _dirSched.length && performance.now()>=_dirLock){
          var gt=base+ga;   // нҳ„мһ¬ кІҢмһ„мӢңк°„
          // gt мқҙн•ҳмқҳ л§Ҳм§Җл§ү м„ёк·ёлЁјнҠёлҘј м°ҫмқҢ
          var ti=-1;
          for(var s=0;s<_dirSched.length;s++){ if(_dirSched[s].gt<=gt) ti=s; else break; }
          if(ti>=0 && ti!==_dirIdx){
            var seg=_dirSched[ti];
            _dirIdx=ti;
            if(seg.pov!==curPov && ROWS[seg.pov] && ROWS[seg.pov].video){
              _dirLock=performance.now()+900;   // м „нҷҳ нӣ„ 0.9s лҠ” мһ¬м „нҷҳ м–өм ң(л¶Җл“ңлҹҪкІҢ)
              setActive(seg.pov);
              showDirLabel(seg.pov, seg.why);   // м§ҖкёҲ лҲ„кө¬ мӢңм җмқём§Җ нҷ”л©ҙм—җ мһ к№җ н‘ңмӢң
            }
          }
          // н”„лҰ¬мӣҢл°Қ: лӢӨмқҢ м„ёк·ёлЁјнҠёк°Җ 4мҙҲ м•Ҳм—җ мҳӨл©ҙ, к·ё мӢңм җ л№„л””мҳӨлҘј лҜёлҰ¬ лӘ©н‘ң мӢңк°ҒмңјлЎң мӢңнҒ¬н•ҙ
          // м „нҷҳ мҲңк°„ seek лҢҖкё° м—Ҷмқҙ мҰүмӢң нҒ¬лЎңмҠӨнҺҳмқҙл“ңлҗҳкІҢ н•ңлӢӨ(л°ұк·ёлқјмҡҙл“ңВ·мқҢмҶҢкұ° мғҒнғң к·ёлҢҖлЎң).
          var ni=ti+1;
          if(ni<_dirSched.length){
            var nseg=_dirSched[ni];
            if(nseg.pov!==curPov && nseg.gt-gt<=6 && nseg.gt-gt>0 && _dirWarm!==ni && POOL){
              var wv=POOL.querySelector('.pvid[data-pv="'+nseg.pov+'"]');
              if(wv && !wv._err){
                _dirWarm=ni;
                var wt=nseg.gt - rowG0(nseg.pov); if(wt<0) wt=0;   // к·ё мӢңм җ мҳҒмғҒм—җм„ңмқҳ лӘ©н‘ң мӢңк°Ғ
                try{ if(Math.abs((wv.currentTime||0)-wt)>0.3) wv.currentTime=wt; }catch(_){}
              }
            }
          }
        }
      }
      syncRAF=requestAnimationFrame(loop);
    }
    syncRAF=requestAnimationFrame(loop);
  }

  function bindPov(){
    var host = document.getElementById('povhost');
    if(!host) return;
    host.addEventListener('click', function(e){
      // ліҙкё° лӘЁл“ң м„ёк·ёлЁјнҠё(лӢЁмқј/лӮҳлһҖнһҲ/нҸ¬м»ӨмҠӨ) вҖ” н•ӯмғҒ ліҙмқҙкі , н•ң лІҲ нҒҙлҰӯмңјлЎң к·ё лӘЁл“ңлЎң
      var orb = e.target.closest('[data-or]');
      if(orb){ markResume(); orientUserSet=true; gridVert=(orb.dataset.or==='v'); renderPovBar(); renderStage(); return; }
      var seg = e.target.closest('[data-vm]');
      if(seg){
        var vm = seg.dataset.vm;
        markResume();
        if(vm==='single'){
          if(split){ if(selected.length) curPov = selected[0]; split=false; selected=[]; orientUserSet=false; }
        } else {   // л©ҖнӢ° вҶ’ кІ©мһҗ ліҙкё°. мІҳмқҢ м§„мһ…мқҙл©ҙ мҳҒмғҒ 2к°ң мһҗлҸҷ м„ нғқ
          if(!split){
            split=true;
            if(selected.length<2){
              selected=[];
              if(ROWS[curPov] && ROWS[curPov].video) selected.push(curPov);
              for(var k=0;k<ROWS.length && selected.length<2;k++){ if(selected.indexOf(k)<0 && ROWS[k] && ROWS[k].video) selected.push(k); }
              orientUserSet=false;
            }
          }
          splitMode='grid';
          if(!orientUserSet) gridVert = (selected.length===2);   // 2лӘ…=мң„м•„лһҳ кё°ліё / 3В·4лӘ…=к·ёлҰ¬л“ң
        }
        renderPovBar(); renderStage(); return;
      }
      // м–јкөҙ нҒҙлҰӯ
      var tab = e.target.closest('.povtab'); if(!tab) return;
      var i = +tab.dataset.idx;
      if(split){
        if(!ROWS[i] || !ROWS[i].video) return;            // л№„көҗ лӘЁл“ң: мҳҒмғҒ м—ҶлҠ” мӢңм җмқҖ м„ нғқ л¶Ҳк°Җ
        markResume();
        var pos = selected.indexOf(i);
        if(pos>=0){ if(selected.length>2) selected.splice(pos,1); }   // лӢӨмӢң лҲ„лҘҙл©ҙ м ңмҷё(мөңмҶҢ 2лӘ…)
        else if(selected.length<4){ selected.push(i); }              // м¶”к°Җ(мөңлҢҖ 4лӘ…)
        if(!orientUserSet) gridVert = (selected.length===2);          // 2лӘ…=мң„м•„лһҳ / 3В·4лӘ…=к·ёлҰ¬л“ң(мӮ¬мҡ©мһҗк°Җ м§Ғм ‘ кі лҘҙкё° м „к№Ңм§Җ)
        renderPovBar(); renderStage();
      } else {
        setActive(i); renderPovBar(); renderAnalysis();
      }
    });
  }

  function verdictLine(me, won){
    var lane=me.lane||{}, pos=me.position||'';
    var isLane=pos!=='JUNGLE'&&pos!=='UTILITY';
    var key;
    if(isLane && lane.cs10!=null && lane.cs10>=15) key='лқјмқём „мқ„ к°•н•ҳкІҢ м§Җл°°н•ң';
    else if(isLane && lane.cs10!=null && lane.cs10>=10) key='лқјмқём „ мҡ°мң„лҘј мһЎмқҖ';
    else if(isLane && lane.cs10!=null && lane.cs10<=-10) key='лқјмқём „мқҙ л°ҖлҰ°';
    else if(me.deaths!=null && me.deaths>=8) key='көҗм „м—җм„ң мһҗмЈј лҒҠкёҙ';
    else if(me.kda!=null && me.kda>=4) key='м•Ҳм •м ҒмңјлЎң н’Җм–ҙк°„';
    else if(me.kp!=null && me.kp>=0.6) key='нҢҖ көҗм „мқ„ мЈјлҸ„н•ң';
    else key='л¬ҙлӮңн•ҳкІҢ нқҳлҹ¬к°„';
    var tail = won===true?' кІҪкё°мһ…лӢҲлӢӨ. к°•м җмқ„ мң м§Җн•ҙ ліҙм„ёмҡ”.':(won===false?' кІҪкё°мһ…лӢҲлӢӨ. м•„лһҳ к°ңм„ м җмқ„ м§ҡм–ҙ ліҙм„ёмҡ”.':' кІҪкё°мһ…лӢҲлӢӨ.');
    return key+tail;
  }

  // н•ҳмқҙлқјмқҙнҠё: мқҙлҜё м—…лЎңл“ңлҗң мқҙлІӨнҠё(нӮ¬В·мҳӨлёҢм қнҠё)л§ҢмңјлЎң к°ҖмһҘ к·№м Ғмқё мһҘл©ҙмқ„ кіЁлқјлӮёлӢӨ(м„ңлІ„/мһ¬л¶„м„қ л¶Ҳн•„мҡ” вҶ’ кё°мЎҙ мҳҒмғҒм—җлҸ„ м Ғмҡ©).
  // н•ңнғҖ(нӮ¬ л°Җм§‘)В·л°”лЎ /мһҘлЎң көҗм „В·лӮҙ л©ҖнӢ°нӮ¬В·м„ м·Ём җмқ„ м җмҲҳнҷ”н•ҙ мғҒмң„ лӘҮ к°ңл§Ң. (мЈҪмқҢ мң„кё° кө¬м¶ң л“ұмқҖ мІҙл Ҙ лҚ°мқҙн„°к°Җ м—Ҷм–ҙ м ңмҷё)
  // в”Җв”Җ к°җлҸ…нҢҗ(Director's Cut): нӮ¬ мҲңк°„л§ҲлӢӨ к·ё нӮ¬мқ„ лӮё м„ мҲҳ мӢңм җмңјлЎң мһҗлҸҷ м „нҷҳн•ҳлҠ” нғҖмһ„лқјмқё мғқм„ұ в”Җв”Җ
  // л°ҳнҷҳ: [{gt: м „нҷҳн•  кІҢмһ„мӢңк°„, pov: ROWS мқёлҚұмҠӨ, why: лқјлІЁ}] вҖ” кІҢмһ„мӢңк°„ мҳӨлҰ„м°ЁмҲң.
  // к·ңм№ҷ: нӮ¬лҹ¬ мӢңм җмқҙ м—…лЎңл“ңлҸј мһҲмңјл©ҙ к·ё мӢңм җ, м—Ҷмңјл©ҙ м–ҙмӢңмҠӨнҠё мӢңм җ, к·ёкІғлҸ„ м—Ҷмңјл©ҙ н”јн•ҙмһҗ мӢңм җ(лӢ№н•ҳлҠ” мһҘл©ҙ), лӢӨ м—Ҷмңјл©ҙ мҠӨнӮө.
  function directorSchedule(){
    var players=ANALYSIS.players||[];
    if(!players.length) return [];
    // participant id(1-based) вҶ’ ROWS мқёлҚұмҠӨ (к·ё м„ мҲҳ мӢңм җмқҙ м—…лЎңл“ңлҗң кІҪмҡ°л§Ң)
    var pidToRow={};
    ROWS.forEach(function(r,ri){
      if(!r || !r.video) return;
      var sv=r.saver; if(!sv) return;
      for(var i=0;i<players.length;i++){ if(players[i] && players[i].name===sv){ pidToRow[i+1]=ri; break; } }
    });
    var haveRows=Object.keys(pidToRow).length;
    if(haveRows<1) return [];
    var LEAD=5.0;   // нӮ¬ лӘҮ мҙҲ м „м—җ лҜёлҰ¬ м „нҷҳ(нӮ¬лЎң мқҙм–ҙм§ҖлҠ” көҗм „л¶Җн„° к·ё мӢңм җмңјлЎң ліҙкІҢ). Riot нӮ¬ мӢңк°Ғкіј мҳҒмғҒ мӢңк°Ғмқҳ мҳӨм°ЁлҸ„ нқЎмҲҳ.
    var kills=(ANALYSIS.kills||[]).filter(function(e){return e&&typeof e.t==='number';}).slice().sort(function(a,b){return a.t-b.t;});
    var seg=[];
    kills.forEach(function(k){
      // мқҙ нӮ¬мқ„ ліҙм—¬мӨ„ мөңм Ғ мӢңм җ: нӮ¬лҹ¬ > м–ҙмӢңмҠӨнҠё(мІ«лІҲм§ё м—…лЎңл“ңлҗң) > н”јн•ҙмһҗ
      var pov=null, why='';
      if(k.killer && pidToRow[k.killer]!=null){ pov=pidToRow[k.killer]; why='kill'; }
      else {
        var asr=null; (k.assists||[]).some(function(a){ if(pidToRow[a]!=null){ asr=pidToRow[a]; return true; } return false; });
        if(asr!=null){ pov=asr; why='assist'; }
        else if(k.victim && pidToRow[k.victim]!=null){ pov=pidToRow[k.victim]; why='death'; }
      }
      if(pov==null) return;   // кҙҖл Ёмһҗ м•„л¬ҙлҸ„ мӢңм җ м•Ҳ мҳ¬лҰј вҶ’ мҠӨнӮө(м§Ғм „ мӢңм җ мң м§Җ)
      var gt=Math.max(0, k.t - LEAD);
      // м§Ғм „ м„ёк·ёлЁјнҠёмҷҖ к°ҷмқҖ мӢңм җмқҙл©ҙ н•©м№Ё(л¶Ҳн•„мҡ”н•ң м „нҷҳ л°©м§Җ)
      if(seg.length && seg[seg.length-1].pov===pov){ return; }
      seg.push({gt:gt, pov:pov, why:why, kt:k.t});
    });
    return seg;
  }

  function computeHighlights(myPid){
    var K=(ANALYSIS.kills||[]).filter(function(e){return e&&typeof e.t==='number'&&(e.killer||e.victim);}).slice().sort(function(a,b){return a.t-b.t;});
    var O=(ANALYSIS.objs||[]).filter(function(e){return e&&typeof e.t==='number';});
    var dur=ANALYSIS.duration||0;
    if(!K.length && !O.length) return [];
    function objIn(t0,t1,kind,sub){ for(var i=0;i<O.length;i++){var o=O[i]; if(o.t>=t0&&o.t<=t1&&o.kind===kind&&(sub==null||(o.sub||'')===sub)) return o;} return null; }
    var GAP=12, clusters=[], cur=null;
    K.forEach(function(k){
      if(cur && k.t-cur.end<=GAP){ cur.kills.push(k); cur.end=k.t; }
      else { cur={start:k.t,end:k.t,kills:[k]}; clusters.push(cur); }
    });
    var cand=[];
    clusters.forEach(function(c){
      var n=c.kills.length; if(n<2) return;   // 1нӮ¬мқҖ н•ңнғҖк°Җ м•„лӢҳ(нӮ¬ мӨ„м—җ мқҙлҜё мһҲмқҢ)
      var myK=0, mine=false;
      c.kills.forEach(function(k){ if(myPid>0){ if(k.killer===myPid){myK++;mine=true;} if(k.victim===myPid)mine=true; if((k.assists||[]).indexOf(myPid)>=0)mine=true; } });
      var baron=objIn(c.start-16,c.end+16,'BARON_NASHOR',null);
      var elder=objIn(c.start-16,c.end+16,'DRAGON','ELDER_DRAGON');
      var dragon=objIn(c.start-16,c.end+16,'DRAGON',null);
      var score=n, label;
      if(baron){ score+=5; label='л°”лЎ  н•ңнғҖ'; }
      else if(elder){ score+=4; label='мһҘлЎң н•ңнғҖ'; }
      else if(n>=4){ score+=2; label='лҢҖк·ңлӘЁ н•ңнғҖ '+n+'нӮ¬'; }
      else if(dragon){ score+=1.5; label='мҡ© көҗм „ '+n+'нӮ¬'; }
      else label='н•ңнғҖ '+n+'нӮ¬';
      if(myK>=2){ label=({2:'лҚ”лё”нӮ¬',3:'нҠёлҰ¬н”ҢнӮ¬',4:'мҝјл“ңлқјнӮ¬',5:'нҺңнғҖнӮ¬'}[Math.min(5,myK)])+(baron?' В· л°”лЎ ':(elder?' В· мһҘлЎң':'')); score+=myK*2.5; }
      if(mine) score+=2;
      if(dur && c.end>=dur-80) score+=3;   // нӣ„л°ҳ кІ°м •м Ғ көҗм „ к°ҖмӨ‘
      cand.push({disp:c.start, lead:5, label:label, score:score});
    });
    function inFight(t){ return clusters.some(function(c){ return c.kills.length>=2 && t>=c.start-13 && t<=c.end+13; }); }
    O.forEach(function(o){
      if(o.kind==='BARON_NASHOR' && !inFight(o.t)) cand.push({disp:o.t, lead:8, label:'л°”лЎ  нҡҚл“қ', score:5});
      else if(o.kind==='DRAGON' && (o.sub||'')==='ELDER_DRAGON' && !inFight(o.t)) cand.push({disp:o.t, lead:8, label:'мһҘлЎң л“ңлһҳкіӨ', score:4});
    });
    if(K.length && K[0].t<=480) cand.push({disp:K[0].t, lead:4, label:'м„ м·Ём җ', score:2.5});
    cand.sort(function(a,b){return b.score-a.score;});
    var picked=[];
    cand.forEach(function(h){ if(picked.length<5 && !picked.some(function(p){return Math.abs(p.disp-h.disp)<8;})) picked.push(h); });
    picked.sort(function(a,b){return a.disp-b.disp;});
    return picked.map(function(h){ return {t:Math.max(0,h.disp-h.lead), disp:h.disp, label:h.label}; });
  }

  function jumpsBlock(){
    var saver=(ROWS[curPov]||{}).saver;
    var players=ANALYSIS.players||[];
    var meIdx=-1, i;
    for(i=0;i<players.length;i++){ if(players[i].name===saver){ meIdx=i; break; } }
    var pid = meIdx>=0 ? meIdx+1 : -1;
    // н•ҳмқҙлқјмқҙнҠё(кІҢмһ„ м „мІҙ В· лӮҙк°Җ лӮҖ мһҘл©ҙмқҖ к°ҖмӨ‘)
    var hls=computeHighlights(pid), hlHTML='';
    if(hls.length){
      var spark='<svg class="hi" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
      var hb=hls.map(function(h){ return '<button class="jbtn hl" data-jump="'+Math.round(h.t)+'">'+spark+'<span class="hl-l">'+h.label+'</span><span class="hl-t">'+fmtT(h.disp)+'</span></button>'; }).join('');
      hlHTML='<div class="kdrow hl"><span class="kdtag hc"><span class="cdot"></span>н•ҳмқҙлқјмқҙнҠё</span><div class="kdstrip">'+hb+'</div></div>';
    }
    // лӮҙ нӮ¬В·лҚ°мҠӨ
    var kdHTML='';
    if(pid>0){
      var allK=(ANALYSIS.kills||[]);
      var myKills=allK.filter(function(e){ return e.killer===pid; }).sort(function(a,b){return a.t-b.t;});
      var myDeaths=allK.filter(function(e){ return e.victim===pid; }).sort(function(a,b){return a.t-b.t;});
      var row=function(arr,kind,labelko,tagcls){
        if(!arr.length) return '';
        var btns=arr.map(function(e){ return '<button class="jbtn '+kind+'" data-jump="'+Math.max(0,e.t-4)+'">'+fmtT(e.t)+'</button>'; }).join('');
        return '<div class="kdrow '+kind+'"><span class="kdtag '+tagcls+'"><span class="cdot"></span>'+labelko+'</span><div class="kdstrip">'+btns+'</div></div>';
      };
      if(myKills.length||myDeaths.length){
        kdHTML=row(myKills,'kill','нӮ¬','kc')+row(myDeaths,'death','лҚ°мҠӨ','dc');
      }
    }
    if(!hlHTML && !kdHTML) return '';
    // к°җлҸ…нҢҗ лІ„нҠј: мӢңм җмқҙ 2к°ң мқҙмғҒмқҙкі  м „нҷҳн•  нӮ¬ мҠӨмјҖмӨ„мқҙ мһҲмқ„ л•Ңл§Ң
    var dirHTML='';
    var _vidRows=ROWS.filter(function(r){return r&&r.video;}).length;
    if(_vidRows>=2){
      var _sc=directorSchedule();
      if(_sc && _sc.length){
        dirHTML='<button class="dirbtn'+(director?' on':'')+'" id="dirbtn" title="нӮ¬ мҲңк°„л§ҲлӢӨ к·ё мӢңм җмңјлЎң мһҗлҸҷ м „нҷҳн•ҳл©° мһ¬мғқ">'
          +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>'
          +'<span>к°җлҸ…нҢҗ</span></button>';
      }
    }
    return '<div class="vjumps">'+dirHTML+hlHTML+kdHTML+'</div>';
  }

  var _countObs = null;
  function countUp(el){
    var txt = (el.textContent||'').trim();
    var m = txt.match(/^([^\d]*)([\d][\d,]*(?:\.\d+)?)(.*)$/);
    if(!m) return;
    var pre=m[1], numS=m[2], suf=m[3], hasC=numS.indexOf(',')>=0, dec=(numS.split('.')[1]||'').length, target=parseFloat(numS.replace(/,/g,''));
    if(!isFinite(target)) return;
    function fmt(v){ var s; if(hasC){ s=Number(dec?v.toFixed(dec):Math.round(v)).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); } else { s=dec?v.toFixed(dec):String(Math.round(v)); } return pre+s+suf; }
    var st=null;
    function step(ts){ if(st==null) st=ts; var p=Math.min(1,(ts-st)/850), e=1-Math.pow(1-p,3); if(p<1){ el.textContent=fmt(target*e); requestAnimationFrame(step); } else { el.textContent=pre+numS+suf; } }
    el.textContent=fmt(0); requestAnimationFrame(step);
  }
  function runCounts(){
    if(typeof IntersectionObserver==='undefined') return;
    if(_countObs) _countObs.disconnect();
    _countObs = new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ countUp(e.target); _countObs.unobserve(e.target); } }); }, {threshold:.4});
    var els = document.querySelectorAll('#anahost .substat .v'); for(var i=0;i<els.length;i++) _countObs.observe(els[i]);
  }

    + '</svg>';

  // мӢңл„Өл§ҲнӢұ мқёнҠёлЎң: кІҪкё° м§„мһ… мӢң 'лҢҖкІ° м№ҙл“ң' м—°м¶ңмқ„ мҳҒмғҒ мң„м—җ мһ к№җ лҚ®лҠ”лӢӨ.
  //  мһ¬мғқ/к°җлҸ…нҢҗ лЎңм§Ғкіј мҷ„м „нһҲ л¶„лҰ¬ вҖ” мҳӨлІ„л Ҳмқҙк°Җ мӮ¬лқјм§Җл©ҙ м•„лһҳ мӣҗлһҳ мҠӨн…Ңмқҙм§Җк°Җ к·ёлҢҖлЎң лӮЁлҠ”лӢӨ.
  var _introShown=false;
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ мҠӨнӮЁ мӣҗнҷ” (мқёнҠёлЎң лӢӨм–‘м„ұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // DataDragon к°ңлі„ мұ”н”јм–ё JSONмқҳ skins л°°м—ҙм—җм„ң мӢӨм ң мҠӨнӮЁ лІҲнҳёл§Ң лҪ‘лҠ”лӢӨ.
  //  - skins л°°м—ҙм—” нҒ¬лЎңл§Ҳк°Җ м—Ҷкі  numмқҙ м •нҷ• вҶ’ л¶Ҳм—°мҶҚ/нҒ¬лЎңл§Ҳ/мӢ к·ңмұ”н”„ н•Ём • мһҗлҸҷ нҡҢн”ј
  //  - лІ„м „лі„ localStorage мәҗмӢңлЎң мһ¬мҡ”мІӯ м—ҶмқҢ(мұ”н”јм–ёлӢ№ мҲҳмӢӯ л°”мқҙнҠё)
  var _skinNumsCache = {};
  function _skinLsKey(key){ return 'penta_dd_skins_' + ver + '_' + key; }
  async function loadSkinNums(champ){
    var key = P.champKey(champ);
    if(_skinNumsCache[key]) return _skinNumsCache[key];
    try{
      var c = JSON.parse(localStorage.getItem(_skinLsKey(key)) || 'null');
      if(c && c.length){ _skinNumsCache[key] = c; return c; }
    }catch(_){}
    var nums = [0];
    try{
      var r = await fetch('https://ddragon.leagueoflegends.com/cdn/' + ver + '/data/en_US/champion/' + key + '.json');
      var j = await r.json();
      var d = j && j.data && j.data[key];
      var sk = (d && d.skins) || [];
      var out = [];
      for(var i=0;i<sk.length;i++){ if(typeof sk[i].num === 'number') out.push(sk[i].num); }
      if(out.length) nums = out;
      try{ localStorage.setItem(_skinLsKey(key), JSON.stringify(nums)); }catch(_){}
      // мҳӣ лІ„м „ мҠӨнӮЁ мәҗмӢң м •лҰ¬(мҡ©лҹү лҲ„м Ғ л°©м§Җ)
      try{
        for(var x=localStorage.length-1;x>=0;x--){
          var lk=localStorage.key(x);
          if(lk && lk.indexOf('penta_dd_skins_')===0 && lk.indexOf('penta_dd_skins_'+ver+'_')!==0) localStorage.removeItem(lk);
        }
      }catch(_){}
    }catch(e){}
    _skinNumsCache[key] = nums;
    return nums;
  }
  // мҠӨнӮЁлІҲнҳё вҶ’ мӣҗнҷ”(splash) URL. кІҖмҰқлҗң DataDragon нҳ•мӢқ(_num).
  function splashOf(champ, num){
    return 'https://ddragon.leagueoflegends.com/cdn/img/champion/splash/' + P.champKey(champ) + '_' + (num||0) + '.jpg';
  }
  // кё°ліё(0) м ңмҷё мҡ°м„ мңјлЎң лһңлҚӨ мҠӨнӮЁмқ„ кі лҘёлӢӨ. м§Ғм „ мҠӨнӮЁ(exclude)кіј лӢӨлҘҙкІҢ.
  function pickSkin(nums, exclude){
    var pool = nums.filter(function(n){ return n!==0 && n!==exclude; });
    if(!pool.length) pool = nums.filter(function(n){ return n!==exclude; });
    if(!pool.length) pool = nums;
    return pool[Math.floor(Math.random()*pool.length)];
  }
  // мәҗмӢң(localStorage)м—җ мһҲмңјл©ҙ мҰүмӢң мҠӨнӮЁлІҲнҳё л°ҳнҷҳ, м—Ҷмңјл©ҙ null(л°ұк·ёлқјмҡҙл“ң лЎңл“ң лҢҖмғҒ).
  function cachedSkinNums(champ){
    // 1мҲңмң„: м „мІҙ мҠӨнӮЁ лӘ©лЎқ(skins.json, нҺҳмқҙм§Җ лЎңл“ң мӢң н”„лҰ¬лЎңл“ңлҗЁ) мҰүмӢң мЎ°нҡҢ вҶ’ мІҳмқҢл¶Җн„° мҠӨнӮЁ
    var g = P.champSkinNums ? P.champSkinNums(champ) : null;
    if(g && g.length) return g;
    // нҸҙл°ұ: к°ңлі„ мәҗмӢң(skins.json лҜёл°°нҸ¬/лЎңл“ңм „ лҢҖл№„)
    var key=P.champKey(champ);
    if(_skinNumsCache[key]) return _skinNumsCache[key];
    try{ var c=JSON.parse(localStorage.getItem(_skinLsKey(key))||'null'); if(c&&c.length){ _skinNumsCache[key]=c; return c; } }catch(_){}
    return null;
  }
  // мӣҗнҷ”лҘј лӢӨлҘё мҠӨнӮЁмңјлЎң л¶Җл“ңлҹҪкІҢ көҗмІҙ(н”„лҰ¬лЎңл“ң нӣ„ мҳӨлІ„л Ҳмқҙ нҺҳмқҙл“ң). н”„лҰ¬лЎңл“ң мӢӨнҢЁ мӢң кё°мЎҙ мӣҗнҷ” мң м§Җ.
  function swapArt(artEl, url){
    if(!artEl) return;
    var pre=new Image();
    pre.onload=function(){
      var ov=document.createElement('img');
      ov.src=url;
      ov.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;opacity:0;transition:opacity .5s ease;will-change:opacity';
      artEl.appendChild(ov); void ov.offsetWidth; ov.style.opacity='1';
      setTimeout(function(){ var base=artEl.querySelector('img[data-fb]'); if(base){base.src=url;} artEl.classList.remove('sq'); try{ov.remove();}catch(_){} },520);
    };
    pre.onerror=function(){};
    pre.src=url;
  }

  function playIntro(rep, won){
    try{
      if(_introShown) return; _introShown=true;
      var host=document.getElementById('stagehost'); if(!host) return;
      var reduce=false; try{ reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches; }catch(_){}
      if(reduce) return;
      var players=ANALYSIS.players||[];
      // в”Җв”Җ м—…лЎңлҚ”(мӢңм җмқ„ мҳ¬лҰ° мӢӨм ң мӮ¬мҡ©мһҗ)лҘј м¶”м¶ң в”Җв”Җ ROWS к°Ғ н•ӯлӘ© = н•ң лӘ…мқҳ м—…лЎңл“ң.
      function champOf(saver){
        for(var i=0;i<players.length;i++){ if(players[i].name===saver) return players[i]; }
        return null;
      }
      var uploaders=[];
      (ROWS||[]).forEach(function(r){
        if(!r || !r.saver) return;
        var pl=champOf(r.saver);
        if(!pl) return;
        // к°ҷмқҖ мӮ¬лһҢмқҙ мӨ‘ліө м•Ҳ лҗҳкІҢ
        if(uploaders.some(function(u){return u.name===r.saver;})) return;
        uploaders.push({ name:r.saver, champion:pl.champion, position:pl.position, team:pl.team });
      });
      if(!uploaders.length) return;   // м—…лЎңлҚ” м •ліҙ м—Ҷмңјл©ҙ мқёнҠёлЎң мғқлһө
      var n=uploaders.length, many=n>=3;

      // мәҗмӢңлҗң мҠӨнӮЁмқҖ мҰүмӢң мІҳмқҢл¶Җн„° л°ҳмҳҒ(мһ¬л°©л¬ёмқҙл©ҙ лҢҖл¶Җл¶„ м—¬кё°). лҜёмәҗмӢң(null)лҠ” мқёнҠёлЎң лң¬ л’Ө лЎңл“ңн•ҙ көҗмІҙ.
      uploaders.forEach(function(u){
        var nums=cachedSkinNums(u.champion);
        u.skinNum = nums ? ((nums.length>1)?pickSkin(nums,0):0) : null;
      });

      // к°Ғ м—…лЎңлҚ” м№ҙл“ң: мәҗмӢңлҗң мҠӨнӮЁмқҙ мһҲмңјл©ҙ к·ё мҠӨнӮЁмңјлЎң мӢңмһ‘, м—Ҷмңјл©ҙ centered(кё°ліё)лЎң мӢңмһ‘(л’Өм—җм„ң көҗмІҙ). нҸҙл°ұ: centered вҶ’ portrait вҶ’ м•„мқҙмҪҳ.
      function upCard(u, idx){
        var nm=(u.name||'').split('#')[0]||'-';

        var portrait=P.champPortrait(u.champion), icon=P.champIcon(ver,u.champion);
        var first=(u.skinNum!=null)?splashOf(u.champion, u.skinNum):centered;
        return '<div class="upc '+team+'" data-uc="'+idx+'">'
          + '<div class="upc-art"><img src="'+first+'" alt="" loading="eager" data-fb="0" onerror="var s=this;var st=+s.getAttribute(\'data-fb\')||0;s.setAttribute(\'data-fb\',st+1);if(st===0){s.src=\''+centered+'\';}else if(st===1){s.src=\''+portrait+'\';}else if(st===2){s.src=\''+icon+'\';s.parentNode.classList.add(\'sq\');}else{s.onerror=null;}"></div>'
          + '<div class="upc-veil"></div>'
          + '<div class="upc-info">'
          +   '<div class="upc-nm">'+esc(nm)+'</div>'
          +   '<div class="upc-ch">'+esc(u.champion||'')+(pos?(' <span class="upc-pos">'+esc(pos)+'</span>'):'')+'</div>'
          + '</div>'
          + '</div>';
      }

      var el=document.createElement('div');
      el.className='matchintro up-'+(many?'many':String(n));   // up-1 / up-2 / up-many
      // upstage(мӣҗнҷ”) + л“ұмһҘнҡЁкіј(н”ҢлһҳмӢң/мҠӨмң•) + м№ҙмҡҙнҠёлӢӨмҡҙ(л¬ёкө¬+мҲ«мһҗ+л§Ғ)
      el.innerHTML='<div class="upstage">'+uploaders.map(function(u,i){return upCard(u,i);}).join('')+'</div>'
        +'<div class="fxshimmer"></div>'
        +'<div class="fxparticles">'+Array(14).fill(0).map(function(_,i){return '<span class="pt pt'+(i%7)+'"></span>';}).join('')+'</div>'
        +'<div class="fxflash"></div>'
        +'<div class="fxsweep"></div>'
        +'<div class="countwrap">'
        +  '<div class="countnum">'
        +    '<div class="countrays"></div>'
        +    '<div class="countglow"></div>'
        +    '<div class="countripple"></div>'
        +    '<svg class="countring" viewBox="0 0 100 100">'
        +      '<circle class="ringbg" cx="50" cy="50" r="46"></circle>'
        +      '<circle class="ringfg" cx="50" cy="50" r="46"></circle>'
        +      '<circle class="ringdash" cx="50" cy="50" r="40"></circle>'
        +    '</svg>'
        +    '<span class="countn"></span>'
        +  '</div>'
        +'</div>'
        +'<div class="fxfinal"><div class="fxburst"></div><div class="fxshock"></div><div class="fxshock fxshock2"></div></div>';
      host.appendChild(el);
      // лҜёмәҗмӢң(лӘ©лЎқ лЎңл“ң м „) мұ”н”„: лӘ©лЎқ(skins.json) лЎңл“ң мҷ„лЈҢлҗҳл©ҙ л°ҳмҳҒ, м—Ҷмңјл©ҙ к°ңлі„ лЎңл“ңлЎң нҸҙл°ұ
      uploaders.forEach(function(u, i){
        if(u.skinNum!=null) return;   // мқҙлҜё лӘ©лЎқ мәҗмӢңлЎң мІҳмқҢл¶Җн„° мҠӨнӮЁ н‘ңмӢңлҗЁ
        function apply(nums){
          if(!nums || nums.length<=1) return;
          var card=el.querySelector('.upc[data-uc="'+i+'"]');
          if(card) swapArt(card.querySelector('.upc-art'), splashOf(u.champion, pickSkin(nums,0)));
        }
        P.skinsAll().then(function(){
          var nums=P.champSkinNums(u.champion);
          if(nums) apply(nums);
          else loadSkinNums(u.champion).then(apply).catch(function(){});
        }).catch(function(){ loadSkinNums(u.champion).then(apply).catch(function(){}); });
      });
      var done=false;
      function dismiss(){
        if(done) return; done=true;
        if(_countTimer){ clearInterval(_countTimer); _countTimer=null; }
        el.classList.add('finalburst');                          // мөңмў… н”ҢлһҳмӢң + кіЁл“ң м¶©кІ©нҢҢ
        setTimeout(function(){ el.classList.add('out'); }, 150);  // н”ҢлһҳмӢң м Ҳм •м—җм„ң мӣҗнҷ” нҺҳмқҙл“ңм•„мӣғ мӢңмһ‘
        setTimeout(function(){ try{ el.remove(); }catch(_){} }, 1100);
      }
      // м№ҙмҡҙнҠёлӢӨмҡҙ: мӣҗнҷ” л“ұмһҘ нӣ„ ~1.8мҙҲ л’Өл¶Җн„° 5вҶ’1 (л§Ө 1мҙҲ). лҒқлӮҳл©ҙ мҳҒмғҒмңјлЎң м „нҷҳ.
      var numEl=el.querySelector('.countn'), wrap=el.querySelector('.countwrap');
      var ringEl=el.querySelector('.countring .ringfg');
      var glowEl=el.querySelector('.countglow'), rippleEl=el.querySelector('.countripple'), raysEl=el.querySelector('.countrays');
      var cnt=5;
      var _countTimer=null;
      setTimeout(function(){
        if(done) return;
        el.classList.add('counting');
        function tick(){
          if(done) return;
          if(cnt<=0){ if(_countTimer){clearInterval(_countTimer);_countTimer=null;} dismiss(); return; }
          numEl.textContent=cnt;
          // мҲ«мһҗВ·л§ҒВ·л°ңкҙ‘В·нҢҢлҸҷмқ„ к°ҷмқҖ мҲңк°„м—җ мһ¬мӢңмһ‘ вҶ’ мҷ„м „ лҸҷкё°нҷ”(reflow лЎң м• лӢҲл©”мқҙм…ҳ лҰ¬м…Ӣ)
          numEl.classList.remove('pulse');
          if(ringEl) ringEl.classList.remove('go');
          if(glowEl) glowEl.classList.remove('pulse');
          if(rippleEl) rippleEl.classList.remove('go');
          if(raysEl) raysEl.classList.remove('go');
          void numEl.offsetWidth;                       // к°•м ң лҰ¬н”ҢлЎңмҡ°: лӘЁл“  м• лӢҲл©”мқҙм…ҳмқҙ лҸҷмӢңм—җ мІҳмқҢл¶Җн„°
          numEl.classList.add('pulse');
          if(ringEl) ringEl.classList.add('go');
          if(glowEl) glowEl.classList.add('pulse');
          if(rippleEl) rippleEl.classList.add('go');
          if(raysEl) raysEl.classList.add('go');
          wrap.classList.toggle('final', cnt<=3);
          el.classList.toggle('lastone', cnt===1);   // л§Ҳм§Җл§ү 1: нҷ”л©ҙ м§„лҸҷ + к°•н•ң н”ҢлһҳмӢң
          cnt--;
        }
        tick();                          // мҰүмӢң 5 н‘ңмӢң
        _countTimer=setInterval(tick, 1000);
      }, 2200);                          // л“ұмһҘ 2.2мҙҲ нӣ„ м№ҙмҡҙнҠё мӢңмһ‘ вҶ’ мҙқ м•Ҫ 7.2мҙҲ
    }catch(e){}

  // мҠӨнҒ¬лЎӨ лҰ¬л№Ң: м•„лһҳ м„№м…ҳл“Өмқҙ нҷ”л©ҙм—җ л“Өм–ҙмҳ¬ л•Ң л¶Җл“ңлҹҪкІҢ лӮҳнғҖлӮЁ. IntersectionObserver лЎң м„ұлҠҘ м•Ҳм „.
  function setupReveal(){
    try{
      var reduce=false; try{ reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches; }catch(_){}
      // лӢӨмӢңліҙкё°(мҳҒмғҒ)лҠ” л§Ё мң„лқј л°”лЎң ліҙмқҙлҜҖлЎң м ңмҷё. к·ё м•„лһҳ м„№м…ҳ(м ңлӘ©+мҪҳн…җмё )л¶Җн„° лҰ¬л№Ң.
      var secs=main.querySelectorAll('h2.sec');
      var targets=[];
      secs.forEach(function(h,idx){
        if(idx===0) return;                         // мІ« h2(лӢӨмӢңліҙкё°)лҠ” м ңмҷё
        targets.push(h);
        var nx=h.nextElementSibling;                // м ңлӘ© лӢӨмқҢ мҪҳн…җмё  лё”лЎқлҸ„ н•Ёк»ҳ лҰ¬л№Ң
        if(nx && nx.tagName!=='H2') targets.push(nx);
      });
      if(!targets.length) return;
      if(reduce || !('IntersectionObserver' in window)){ targets.forEach(function(t){ t.classList.add('reveal','in'); }); return; }
      targets.forEach(function(t){ t.classList.add('reveal'); });
      var io=new IntersectionObserver(function(entries){
        entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });
      targets.forEach(function(t){ io.observe(t); });
    }catch(e){}
  }

  function saverWon(rep){
    if(rep && rep.won!=null) return rep.won;
    var c=P.saverCard(rep);
    if(c && c.win!=null) return !!c.win;                    // н”Ңл Ҳмқҙм–ҙ мҠ№нҢЁк°Җ мһҲмңјл©ҙ к·ёлҢҖлЎң
    var wt=(ANALYSIS.win_team!=null)?ANALYSIS.win_team:(rep&&rep.winner);   // м—Ҷмңјл©ҙ win_team+лӮҙнҢҖмңјлЎң нҢҗм •
    if(wt!=null && c && c.team!=null) return c.team===wt;
    return null;                                            // м§„м§ң м•Ң мҲҳ м—Ҷмқ„ л•Ңл§Ң лҜёнҷ•мқё
  }

  async function load(){
    MID = qs('id') || '';
    if(!MID){ main.innerHTML='<div class="state"><h3>л§Өм№ҳлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ</h3><p><a href="index.html">лӘ©лЎқмңјлЎң лҸҢм•„к°Җкё°</a></p></div>'; return; }
    try{ ver = await P.ddVersion(); }catch(e){}
    try{ await P.ddChampMap(ver); }catch(e){}
    var rows;
    try{ rows = await P.sbSelect('matches','select=*&match_id=eq.'+encodeURIComponent(MID)+'&order=uploaded.desc'); }
    catch(e){ main.innerHTML='<div class="state"><h3>л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ</h3><p>мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.</p></div>'; return; }
    if(!rows || !rows.length){
      main.innerHTML='<div class="state"><svg class="mk" viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z" fill="currentColor"/></svg><h3>л§Өм№ҳлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ</h3><p>мӮӯм ңлҗҳм—Ҳкұ°лӮҳ м•„м§Ғ м—…лЎңл“ңлҗҳм§Җ м•Ҡм•ҳмқ„ мҲҳ мһҲмҠөлӢҲлӢӨ. <a href="index.html">лӘ©лЎқмңјлЎң</a></p></div>';
      return;
    }
    ROWS = rows;
    try{ ME = await P.initAuth(); }catch(e){ ME = null; }

    var rep = P.pickPrimary(ROWS) || ROWS[0];

    ROWS.forEach(function(r){ var c=P.saverCard(r); r._team = c?c.team:100; });

    var _pov = qs('pov');
    var _pi = _pov ? ROWS.findIndex(function(x){ return String(x.id)===String(_pov); }) : -1;

    if(_t0>0){
