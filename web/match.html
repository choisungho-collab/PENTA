<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>myPENTA — 매치 분석</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z' fill='%23DEC79C'/%3E%3C/svg%3E">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#080A0E;--surface:#0F131A;--surface2:#161B23;--hover:#1C2530;--well:#0B0E13;
 --ink:#ECE7DD;--ink2:#C2BBAD;--dim:#867F71;--faint:#564F44;
 --line:#1F252E;--line2:#2B323C;
 --gold:#DEC79C;--gold-ink:#EFDDBC;--gold-soft:rgba(222,199,156,.11);--gold-line:rgba(222,199,156,.32);
 --win:#52C3AC;--win-soft:rgba(82,195,172,.12);--win-line:rgba(82,195,172,.42);
 --loss:#DE7480;--loss-soft:rgba(222,116,128,.12);--loss-line:rgba(222,116,128,.42);
 --blue:#3D9BE0;--blue-soft:rgba(61,155,224,.1);--blue-line:rgba(61,155,224,.34);
 --red:#E0563D;--red-soft:rgba(224,86,61,.1);--red-line:rgba(224,86,61,.34);
 --fd:'Pretendard Variable','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
 --fs:'Clash Display','Pretendard Variable','Pretendard',sans-serif;
 --fg:'Sora',sans-serif;
 --fm:'IBM Plex Mono',ui-monospace,monospace;
 --r1:10px;--r2:14px;--r3:18px;--sh:0 18px 44px -22px rgba(0,0,0,.8);
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--fd);font-size:15px;line-height:1.65;word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}svg{display:block}img{display:block;max-width:100%}
.ic{width:1em;height:1em;flex-shrink:0}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}
.wrap{max-width:1160px;margin:0 auto;padding:0 24px 110px}

.bar{position:sticky;top:0;z-index:50;background:rgba(8,10,14,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.bar-in{max-width:1160px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .mk{width:22px;height:22px;color:var(--gold);filter:drop-shadow(0 0 9px rgba(222,199,156,.4))}
.brand b{font-family:var(--fg);font-weight:600;font-size:20px;letter-spacing:.15em;color:var(--gold)}
.nav{display:flex;gap:2px;margin-left:14px}
.nav a{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--dim);padding:7px 9px 9px;border-bottom:2px solid transparent;transition:.14s}
.nav a:hover{color:var(--ink)}
.nav a.on{color:var(--ink);border-bottom-color:var(--gold)}
.bar .sp{flex:1}

/* 영상 무대 */
.player{margin:22px 0 0}
.stage{position:relative;background:#05080b;border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;aspect-ratio:16/9}
.stage video{width:100%;height:100%;object-fit:contain;background:#05080b;display:block}
.stage.empty{display:grid;place-items:center}
.stage .novid{text-align:center;color:var(--faint);font-family:var(--fd);font-size:14px;padding:24px}
.stage .novid .mk{width:46px;height:46px;color:var(--line2);margin:0 auto 14px}
/* 시점 풀(즉시 전환) */
.stage.pool{position:relative}
.stage.pool .pvid{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#05080b;display:none}
.stage.pool .pvid.on{display:block}
.stage.pool .poolempty{position:absolute;inset:0;display:none;place-items:center;background:#05080b;z-index:2}
.stage.pool .poolempty.on{display:grid}
/* 분할 레이아웃 */
.stage.grid{display:grid;gap:2px;background:var(--line)}
.stage.mv-2{grid-template-columns:1fr 1fr}
.stage.mv-3{grid-template-columns:1fr 1fr}
.stage.mv-3 .cell:first-child{grid-column:1/-1}
.stage.mv-4{grid-template-columns:1fr 1fr}
.stage .cell{position:relative;background:#05080b;overflow:hidden;min-height:0}
.stage .cell video{width:100%;height:100%}
.stage .cell .tag{position:absolute;left:8px;top:8px;font-family:var(--fd);font-size:11px;font-weight:600;color:#fff;background:rgba(5,8,11,.78);padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:5px;z-index:2}
.stage .cell .tag i{width:8px;height:8px;border-radius:50%}
/* 포커스(메인+PiP) */
.piprow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.pipcell{position:relative;aspect-ratio:16/9;background:#05080b;border:1px solid var(--line);border-radius:var(--r1);overflow:hidden;cursor:pointer;transition:.14s}
.pipcell:hover{border-color:var(--gold-line)}
.pipcell video{width:100%;height:100%;object-fit:cover}
.pipcell .tag{font-size:10px;padding:2px 6px}
.pipcell .promote{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,8,11,.42);opacity:0;transition:.14s;color:var(--gold-ink)}
.pipcell .promote svg{width:22px;height:22px}
.pipcell:hover .promote{opacity:1}
/* 분할 레이아웃 토글 */
.lmode{display:inline-flex;gap:3px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r1);padding:3px}
.lmode button{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);background:none;border:0;border-radius:8px;padding:6px 11px;cursor:pointer;transition:.14s}
.lmode button:hover{color:var(--ink)} .lmode button.on{background:var(--gold-soft);color:var(--gold-ink)}
.lmode button svg{width:14px;height:14px}

/* POV 바 (얼굴만) */
.povbar{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.povlab{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);flex:0 0 auto}
.povtabs{display:flex;gap:11px;flex-wrap:wrap}
.povtab{position:relative;display:block;padding:0;border:0;background:none;cursor:pointer;line-height:0}
.povtab img,.povtab .ph{display:block;width:46px;height:46px;border-radius:12px;border:1px solid var(--line2);background:var(--well);object-fit:cover;opacity:.9;filter:grayscale(.08);transition:.16s}
.povtab:hover img,.povtab:hover .ph{opacity:1;border-color:var(--gold-line)}
.povtab.on img,.povtab.sel img,.povtab.on .ph,.povtab.sel .ph{opacity:1;filter:none;border-color:var(--tc);box-shadow:0 0 0 2px var(--tc),0 8px 18px -10px color-mix(in srgb,var(--tc) 55%,transparent)}
.povtab.novid{cursor:default}
.povtab .nov{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);font-family:var(--fm);font-size:8px;font-weight:600;color:var(--dim);background:var(--well);border:1px solid var(--line);border-radius:5px;padding:1px 5px;white-space:nowrap;line-height:1.3}
.splitbtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:13px;color:var(--ink);background:var(--surface2);border:1px solid var(--line2);padding:9px 14px;border-radius:var(--r1);cursor:pointer;transition:.14s;white-space:nowrap;margin-left:auto}
.splitbtn:hover{border-color:var(--line2);color:var(--ink)}
.splitbtn.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}
.splitbtn .ic{width:15px;height:15px}
.splithint{font-family:var(--fd);font-size:12px;color:var(--faint);width:100%}

/* 요약 바 */
.summary{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 20px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.summary .verdict{font-family:var(--fs);font-weight:400;font-size:26px;letter-spacing:.01em;padding-right:22px;border-right:1px solid var(--line)}
.summary .verdict.w{color:var(--win)}.summary .verdict.l{color:var(--loss)}
.summary .si{display:flex;flex-direction:column;gap:4px}
.summary .si .k{font-family:var(--fd);font-size:11px;color:var(--dim);letter-spacing:.02em}
.summary .si .v{font-family:var(--fm);font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
.summary .sp{flex:1}
.summary .acts{display:flex;align-items:center;gap:9px}
.actbtn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ink2);background:var(--well);border:1px solid var(--line);padding:9px 14px;border-radius:var(--r1);cursor:pointer;transition:.14s;font-variant-numeric:tabular-nums}
.actbtn:hover{border-color:var(--line2);color:var(--ink)}
.actbtn.liked{color:var(--loss);border-color:var(--loss-line);background:var(--loss-soft)}
.actbtn .ic{width:15px;height:15px}
.actbtn.view{cursor:default}

h2.sec{font-family:var(--fs);font-weight:400;font-size:20px;letter-spacing:.02em;color:var(--ink);margin:34px 0 14px;display:flex;align-items:center;gap:11px}
h2.sec .ln{flex:1;height:1px;background:var(--line)}

/* 골드 그래프 */
.chartcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 18px 12px}
.chartcard .lg{display:flex;align-items:center;gap:18px;margin-bottom:6px;font-family:var(--fd);font-size:12.5px;color:var(--dim)}
.chartcard .lg i{display:inline-block;width:18px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
.chartcard svg{width:100%;height:auto;display:block;overflow:visible}
.chartcard .gx{font-family:var(--fm);font-size:10px;fill:var(--faint)}

/* 오브젝트 */
.objgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px 16px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:16px 22px}
.objgrid .ot{font-family:var(--fd);font-size:12.5px;color:var(--dim);text-align:center;letter-spacing:.02em}
.objgrid .ov{font-family:var(--fm);font-size:16px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px}
.objgrid .ov.b{color:var(--blue);justify-content:flex-end}
.objgrid .ov.r{color:var(--red)}
.objgrid .ov .ic{width:15px;height:15px;opacity:.85}
.objgrid .ov b{font-weight:600}.objgrid .ov.lead b{color:var(--gold-ink)}

/* 스코어보드 */
.board{display:flex;flex-direction:column;gap:16px}
.team{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden}
.team.blue{border-top:2px solid var(--blue-line)}
.team.red{border-top:2px solid var(--red-line)}
.thead{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.thead .tn{font-family:var(--fs);font-weight:400;font-size:18px;letter-spacing:.01em}
.team.blue .thead .tn{color:var(--blue)}.team.red .thead .tn{color:var(--red)}
.thead .wl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:6px}
.thead .wl.w{color:var(--win);background:var(--win-soft);border:1px solid var(--win-line)}
.thead .wl.l{color:var(--loss);background:var(--loss-soft);border:1px solid var(--loss-line)}
.thead .wl.u{color:var(--dim);background:rgba(150,150,160,.1);border:1px solid var(--line2)}
.thead .tstats{font-family:var(--fm);font-size:12.5px;color:var(--dim);font-variant-numeric:tabular-nums;display:flex;gap:14px}
.thead .tstats b{color:var(--ink2);font-weight:600}
.thead .sp{flex:1}
.thead .bans{display:flex;align-items:center;gap:5px}
.thead .bans .bl{font-family:var(--fd);font-size:10.5px;color:var(--faint);margin-right:2px}
.thead .bans img{width:22px;height:22px;border-radius:5px;filter:grayscale(.55) brightness(.8);border:1px solid var(--line2)}

.prow{display:grid;grid-template-columns:auto auto 1fr auto auto auto auto;gap:12px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:0}
.prow.me{background:var(--gold-soft)}
.pchamp{position:relative;width:42px;height:42px;flex-shrink:0}
.pchamp img{width:42px;height:42px;border-radius:9px;border:1px solid var(--line2);background:var(--well)}
.pchamp .lv{position:absolute;right:-4px;bottom:-4px;font-family:var(--fm);font-size:10px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:0 4px;min-width:17px;text-align:center}
.pspells{display:flex;flex-direction:column;gap:3px}
.pspells img{width:19px;height:19px;border-radius:5px;background:var(--well);border:1px solid var(--line)}
.pwho{min-width:0}
.pwho .pn{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
.pwho .pn .mb{font-family:var(--fm);font-size:9.5px;font-weight:600;letter-spacing:.08em;color:#1a1206;background:linear-gradient(180deg,#EFDDBC,#DEC79C);padding:1px 6px;border-radius:5px}
.pwho .pp{font-family:var(--fd);font-size:11.5px;color:var(--dim);margin-top:2px}
.pkda{text-align:center;min-width:74px}
.pkda .n{font-family:var(--fm);font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums}
.pkda .n .s{color:var(--faint)}
.pkda .r{font-family:var(--fd);font-size:11px;color:var(--dim);margin-top:2px}
.pstat{text-align:center;min-width:46px}
.pstat .n{font-family:var(--fm);font-size:13.5px;color:var(--ink2);font-variant-numeric:tabular-nums}
.pstat .l{font-family:var(--fd);font-size:10.5px;color:var(--faint);margin-top:2px}
.pitems{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.pitems .it{width:26px;height:26px;border-radius:6px;background:var(--well);border:1px solid var(--line);overflow:hidden}
.pitems .it.trinket{border-color:var(--gold-line)}
.pitems .it img{width:100%;height:100%}

/* 댓글 */
.cmts{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:20px}
.cform{display:flex;gap:10px;margin-bottom:18px}
.cform input{flex:1;min-width:0;background:var(--well);border:1px solid var(--line);border-radius:var(--r1);padding:11px 14px;color:var(--ink);font-family:var(--fd);font-size:14px;outline:0}
.cform input:focus{border-color:var(--gold-line)}
.cform button{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--bg);background:var(--gold);border:0;padding:0 18px;border-radius:var(--r1);cursor:pointer;white-space:nowrap}
@media(max-width:540px){.cform{flex-wrap:wrap}.cform #cauthor{flex:1 1 100%}.cform #cbody{flex:1 1 auto}.cform button{padding:11px 18px}}
.clist{display:flex;flex-direction:column;gap:14px}
.citem{display:flex;flex-direction:column;gap:4px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.citem:last-child{border-bottom:0;padding-bottom:0}
.citem .ch{display:flex;align-items:center;gap:9px}
.citem .ca{font-family:var(--fd);font-weight:600;font-size:13px;color:var(--ink2)}
.citem .ct{font-family:var(--fd);font-size:11.5px;color:var(--faint)}
.citem .cb{font-family:var(--fd);font-size:14px;color:var(--ink);line-height:1.6}
.cempty{font-family:var(--fd);font-size:13.5px;color:var(--faint);text-align:center;padding:20px}

.state{padding:90px 24px;text-align:center}
.state .mk{width:50px;height:50px;color:var(--line2);margin:0 auto 20px}
.state h3{font-family:var(--fs);font-weight:400;font-size:22px;color:var(--ink);margin:0 0 10px}
.state p{font-family:var(--fd);font-size:14.5px;color:var(--dim);margin:0 auto;max-width:420px;line-height:1.7}
.state a{color:var(--gold-ink);font-weight:600}

@media(max-width:780px){
 .wrap{padding:0 16px 80px}.bar-in{padding:12px 16px}.nav{margin-left:6px}.nav a{padding:6px 7px 7px;font-size:13px}
 .summary{gap:14px 18px}.summary .verdict{font-size:22px;padding-right:16px}
 .prow{grid-template-columns:auto auto 1fr auto;gap:9px;padding:10px 12px}
 .pspells{display:none}.pstat.csst{display:none}.pitems{grid-column:1/-1;grid-template-columns:repeat(7,1fr);margin-top:2px}
 .pkda{min-width:64px}
 .thead .tstats{display:none}
 .objgrid{padding:14px}
}

/* 복기 분석 */
.coach{margin:2px 0 0}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
@media(max-width:560px){.cgrid{grid-template-columns:repeat(2,1fr)}}
.cstat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.cstat .k{font-family:var(--fm);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.cstat .v{font-size:19px;font-weight:700;color:var(--ink);margin-top:3px;line-height:1.1}
.cstat.up .v{color:var(--win)}
.cstat.down .v{color:var(--loss)}
.ceval{display:grid;gap:9px}
.crow{display:flex;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
.crow .ico{flex:0 0 auto;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:800;margin-top:1px}
.crow.g .ico{background:var(--win-soft);color:var(--win)}
.crow.b .ico{background:rgba(232,90,90,.13);color:var(--loss)}
.crow .ct{flex:1;min-width:0}
.crow .ct .t{font-weight:700;font-size:14px;color:var(--ink)}
.crow .ct .a{font-size:13px;color:var(--dim);margin-top:4px;line-height:1.62}
.clabel{font-family:var(--fm);font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px}
.jumps{display:flex;flex-wrap:wrap;gap:7px}
.jbtn{font-family:var(--fm);font-size:12px;background:var(--well);border:1px solid var(--line);color:var(--ink2);padding:6px 11px;border-radius:7px;cursor:pointer;transition:border-color .14s,color .14s,background .14s}
.jbtn:hover{border-color:var(--gold-line);color:var(--gold-ink)}
.jbtn.death{border-color:rgba(232,90,90,.32);color:#e8a0a0}
.jbtn.death:hover{background:rgba(232,90,90,.1);color:#ffbcbc}
.brand b .my,.fbrand b .my,.l b .my{font-weight:300;color:var(--ink);letter-spacing:.01em}
footer{border-top:1px solid var(--line);margin-top:70px}
.foot-in{max-width:1160px;margin:0 auto;padding:28px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.foot-in .fnav{display:flex;gap:16px;font-size:13px}
.foot-in .fnav a{color:var(--dim);transition:.14s;border-bottom:1px solid transparent}
.foot-in .fnav a:hover{color:var(--gold-ink);border-bottom-color:var(--gold-line)}
.foot-in .r{font-family:var(--fd);font-size:12px;color:var(--faint);max-width:520px;text-align:right;line-height:1.6}
@media(max-width:640px){.foot-in .r{text-align:left}}

/* ===== 전적 히어로 ===== */
.hero{position:relative;margin:20px 0 0;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--r3);padding:17px 22px 17px 25px;display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;overflow:hidden}
.hero.w{border-color:var(--win-line)}.hero.l{border-color:var(--loss-line)}
.hero::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.hero.w::before{background:var(--win)}.hero.l::before{background:var(--loss)}
.hchamp{display:flex;align-items:center;gap:13px}
.hchamp .ci{position:relative;width:52px;height:52px;flex-shrink:0}
.hchamp .ci img{width:52px;height:52px;border-radius:13px;border:1px solid var(--line2);background:var(--well)}
.hchamp .ci .lv{position:absolute;right:-4px;bottom:-4px;font-family:var(--fm);font-size:10px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--line2);border-radius:5px;padding:1px 4px}
.hchamp .nm{font-family:var(--fs);font-weight:600;font-size:18.5px;color:var(--ink);line-height:1.04;letter-spacing:-.01em}
.hchamp .po{font-family:var(--fd);font-weight:600;font-size:11.5px;color:var(--dim);margin-top:4px}
.hmid{min-width:0}
.hkda{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.hkda .v{font-family:var(--fs);font-weight:700;font-size:30px;letter-spacing:-.02em;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.hkda .v .s{color:var(--faint);font-weight:500;margin:0 3px}
.hkda .r{font-family:var(--fm);font-size:13px;color:var(--gold-ink);font-weight:500}
.vsum{font-family:var(--fd);font-size:13px;color:var(--ink2);margin-top:9px;line-height:1.5;max-width:46ch}
.hside{display:flex;flex-direction:column;align-items:flex-end;gap:11px;white-space:nowrap}
.wlbadge{font-family:var(--fs);font-weight:700;font-size:18px;letter-spacing:.05em;padding:5px 15px;border-radius:11px}
.wlbadge.w{color:var(--win);background:var(--win-soft);border:1px solid var(--win-line)}
.wlbadge.l{color:var(--loss);background:var(--loss-soft);border:1px solid var(--loss-line)}
.wlbadge.u{color:var(--dim);background:rgba(150,150,160,.1);border:1px solid var(--line2)}
.hmeta{display:flex;gap:18px}
.hmeta .si{text-align:right}
.hmeta .si .k{font-family:var(--fd);font-size:10.5px;color:var(--dim)}
.hmeta .si .v{font-family:var(--fm);font-size:13px;color:var(--ink2);font-variant-numeric:tabular-nums;margin-top:2px}
.hacts{display:flex;gap:8px}
@media(max-width:780px){
 .hero{grid-template-columns:1fr;gap:15px;padding:15px 16px 15px 20px}
 .hside{align-items:flex-start}
 .hkda .v{font-size:27px}.hchamp .nm{font-size:17px}
}

/* 영상 아래 점프 */
.vjumps{margin-top:13px}

/* ===== 복기 분석 격상 ===== */
.coachhead{display:flex;align-items:baseline;gap:11px;margin:40px 0 16px}
.coachhead .t{font-family:var(--fs);font-weight:600;font-size:23px;letter-spacing:-.01em;color:var(--ink)}
.coachhead .s{font-family:var(--fd);font-size:12.5px;color:var(--dim)}
.coachhead .ln{flex:1;height:1px;background:var(--line)}
.keyrow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
@media(max-width:560px){.keyrow{grid-template-columns:1fr}}
.keystat{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--r2);padding:13px 17px}
.keystat.up{border-color:var(--win-line)}.keystat.down{border-color:var(--loss-line)}
.keystat .k{font-family:var(--fd);font-weight:600;font-size:12.5px;color:var(--dim);white-space:nowrap}
.keystat .v{font-family:var(--fs);font-weight:700;font-size:26px;letter-spacing:-.02em;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.keystat.up .v{color:var(--win)}.keystat.down .v{color:var(--loss)}
.keystat .cap{font-family:var(--fd);font-size:12px;color:var(--faint);margin-left:auto}
.subgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.substat{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 15px;flex:1 1 0;min-width:132px}
.substat .k{font-family:var(--fd);font-weight:600;font-size:12px;color:var(--dim);white-space:nowrap}
.substat .v{font-family:var(--fs);font-size:17px;font-weight:600;color:var(--ink);margin-left:auto;line-height:1;font-variant-numeric:tabular-nums}
.substat.up .v{color:var(--win)}.substat.down .v{color:var(--loss)}
@media(max-width:540px){.substat{flex:1 1 calc(50% - 4px);min-width:calc(50% - 4px)}}
.evalcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
@media(max-width:680px){.evalcols{grid-template-columns:1fr}}
.evalcol .eh{font-family:var(--fd);font-weight:700;font-size:12.5px;margin:0 0 9px;display:flex;align-items:center;gap:7px}
.evalcol.good .eh{color:var(--gold-ink)}.evalcol.bad .eh{color:var(--loss)}
.evalcol .eh .dot{width:7px;height:7px;border-radius:2px}
.evalcol.good .eh .dot{background:var(--gold)}.evalcol.bad .eh .dot{background:var(--loss)}

/* ===== 오브젝트 대결 막대 ===== */
.objbars{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:18px 22px;display:flex;flex-direction:column;gap:11px}
.obar{display:grid;grid-template-columns:30px 1fr 30px;gap:12px;align-items:center}
.obar .bn{font-family:var(--fm);font-size:14.5px;font-weight:600;font-variant-numeric:tabular-nums}
.obar .bn.b{color:var(--blue);text-align:right}.obar .bn.r{color:var(--red);text-align:left}
.obar .track{position:relative;height:28px;background:var(--well);border-radius:7px;overflow:hidden}
.obar .fb{position:absolute;left:0;top:0;bottom:0;background:var(--blue-soft)}
.obar .fr{position:absolute;right:0;top:0;bottom:0;background:var(--red-soft)}
.obar.blead .fb{background:var(--blue-line)}.obar.rlead .fr{background:var(--red-line)}
.obar .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fd);font-size:11.5px;color:var(--ink2);z-index:2}
.obar .lbl .ic{width:14px;height:14px;opacity:.75}

/* 측정 지표 등급 */
.grade{display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:var(--r2);padding:16px 20px;margin-bottom:12px}
.grade .gv{font-family:var(--fs);font-weight:700;font-size:42px;line-height:1;width:54px;text-align:center;letter-spacing:-.02em}
.grade.g-s .gv{color:var(--gold-ink)}
.grade.g-a .gv{color:var(--win)}
.grade.g-b .gv{color:var(--blue)}
.grade.g-c .gv{color:var(--ink2)}
.grade.g-d .gv{color:var(--loss)}
.grade.g-s{border-color:var(--gold-line)}
.grade.g-a{border-color:var(--win-line)}
.grade .gx{min-width:0}
.grade .gs{font-family:var(--fs);font-size:21px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.grade .gs .gsl{font-family:var(--fm);font-size:13px;color:var(--faint);font-weight:400}
.grade .gd{font-family:var(--fd);font-size:12px;color:var(--dim);margin-top:4px;line-height:1.45}

/* 체크 질문 / 훈련 과제 */
.checks{margin-top:18px;background:var(--well);border:1px solid var(--gold-line);border-radius:var(--r2);padding:17px 19px}
.checks .chead{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--gold-ink);margin-bottom:11px;letter-spacing:-.01em}
.checks .crq{font-family:var(--fd);font-size:13.5px;color:var(--ink2);padding:6px 0;display:flex;gap:10px;line-height:1.55}
.checks .crq .qm{flex:0 0 auto;width:19px;height:19px;border-radius:6px;background:var(--gold-soft);color:var(--gold-ink);display:grid;place-items:center;font-family:var(--fm);font-size:11px;font-weight:600;margin-top:1px}
.drills{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:17px 19px}
.drills .dhead{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--ink);margin-bottom:10px}
.drills .drow{font-family:var(--fd);font-size:13.5px;color:var(--dim);padding:5px 0;display:flex;gap:9px;line-height:1.55}
.drills .drow .dn{flex:0 0 auto;color:var(--gold);font-weight:700}

/* 이번 게임 핵심 하나 (콜아웃) + 데스 흐름 스트립 */
.cfocus{display:flex;flex-direction:column;gap:5px;background:linear-gradient(180deg,var(--gold-soft),var(--surface));border:1px solid var(--gold-line);border-left:3px solid var(--gold);border-radius:var(--r2);padding:14px 18px;margin-bottom:12px}
.cfocus .cfl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-ink)}
.cfocus .cft{font-family:var(--fd);font-size:14px;color:var(--ink2);line-height:1.55}
.cfocus .cft b{color:var(--ink);font-weight:700}
.dflow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.dflow .dfl{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.dflow .dfseg{display:inline-flex;align-items:baseline;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-family:var(--fd);font-size:12.5px;color:var(--dim)}
.dflow .dfseg b{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
</style>
</head>

<script src="penta-common.js"></script>
<script>
(function(){
  var P = window.PENTA;
  var main = document.getElementById('main');
  var ver = '15.1.1';
  var ROWS = [];          // 이 매치의 시점들
  var ANALYSIS = null;    // 대표 분석
  var MID = '';
  var STAT = { likes: 0, views: 0 };   // match_id 그룹 단위 좋아요/조회
  var curPov = 0;
  var split = false;
  var selected = [];      // 분할 선택 인덱스
  var syncRAF = null;
  var splitMode = 'grid';   // 'grid' | 'focus'
  var resumeAt = 0;         // 레이아웃 전환 시 영상 시각 유지

  function qs(name){ return new URLSearchParams(location.search).get(name); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // 소환사 주문 아이콘(있으면)
  function spellImg(id){ var u=P.spellIcon(ver,id); return u?('<img src="'+u+'" alt="" onerror="this.style.visibility=\'hidden\'">'):'<span style="width:19px;height:19px"></span>'; }
  function itemCell(id,trinket){
    var u=P.itemIcon(ver,id);
    return '<div class="it'+(trinket?' trinket':'')+'">'+(u?'<img src="'+u+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">':'')+'</div>';
  }

  function teamBlock(team){
    var ps = (ANALYSIS.players||[]).filter(function(p){return p.team===team;})
      .sort(function(a,b){return P.posRank(a.position)-P.posRank(b.position);});
    var won = (ANALYSIS.win_team==null) ? null : (ANALYSIS.win_team===team);  // 미확인은 null
    var kills = ps.reduce(function(s,p){return s+(p.kills||0);},0);
    var deaths = ps.reduce(function(s,p){return s+(p.deaths||0);},0);
    var assists = ps.reduce(function(s,p){return s+(p.assists||0);},0);
    var gold = ps.reduce(function(s,p){return s+(p.gold||0);},0);
    var bans = ((ANALYSIS.bans||{})[team])||((ANALYSIS.bans||{})[String(team)])||[];
    var saver = (ROWS[curPov]||{}).saver;

    var rows = ps.map(function(p){
      var bm = P.bestMulti(p);
      var me = saver && p.name===saver;
      var items = (p.items||[]);
      var itemHTML = '';
      for(var i=0;i<6;i++) itemHTML += itemCell(items[i],false);
      itemHTML += itemCell(items[6],true); // 장신구
      return '<div class="prow'+(me?' me':'')+'">'
        + '<div class="pchamp"><img src="'+P.champIcon(ver,p.champion)+'" alt="'+esc(p.champion)+'" loading="lazy" onerror="this.style.visibility=\'hidden\'"><span class="lv">'+(p.level||'')+'</span></div>'
        + '<div class="pspells">'+spellImg((p.spells||[])[0])+spellImg((p.spells||[])[1])+'</div>'
        + '<div class="pwho"><div class="pn">'+esc(p.name||'소환사')+(bm?'<span class="mb">'+(bm.rank===5?'PENTA':bm.rank===4?'QUADRA':'TRIPLE')+'</span>':'')+'</div>'
          + '<div class="pp">'+esc(p.champion)+(P.posKo(p.position)?(' · '+P.posKo(p.position)):'')+'</div></div>'
        + '<div class="pkda"><div class="n">'+(p.kills||0)+'<span class="s"> / </span>'+(p.deaths||0)+'<span class="s"> / </span>'+(p.assists||0)+'</div><div class="r">'+P.kdaRatio(p.kills,p.deaths,p.assists)+' 평점</div></div>'
        + '<div class="pstat csst"><div class="n">'+(p.cs||0)+'</div><div class="l">CS</div></div>'
        + '<div class="pstat"><div class="n">'+P.compact(p.gold)+'</div><div class="l">골드</div></div>'
        + '<div class="pitems">'+itemHTML+'</div>'
      + '</div>';
    }).join('');

    var banHTML = bans.length ? ('<div class="bans"><span class="bl">밴</span>'+bans.map(function(cid){
      return '<img src="'+P.champIcon(ver, champNameById(cid))+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    }).join('')+'</div>') : '';

    return '<div class="team '+(team===100?'blue':'red')+'">'
      + '<div class="thead"><span class="tn">'+(team===100?'블루팀':'레드팀')+'</span>'
        + '<span class="wl '+(won===true?'w':won===false?'l':'u')+'">'+(won===true?'승리':won===false?'패배':'미확인')+'</span>'
        + '<span class="tstats"><span><b>'+kills+'/'+deaths+'/'+assists+'</b> KDA</span><span><b>'+P.compact(gold)+'</b> 골드</span></span>'
        + '<span class="sp"></span>'+banHTML
      + '</div>' + rows + '</div>';
  }

  // 챔피언 id→이름: DataDragon은 이름 기반이라, 밴은 id만 있음.
  // 간단 매핑 테이블(이번 매치 밴에 등장하는 것 위주 + 자주 쓰는 것). 없으면 빈 아이콘.
  var CHID = {266:'Aatrox',32:'Amumu',3:'Galio',81:'Ezreal',80:'Pantheon',17:'Teemo',950:'Naafiri',131:'Diana',145:'Kaisa',54:'Malphite',
    517:'Sylas',67:'Vayne',201:'Braum',518:'Neeko',238:'Zed',800:'Mel',777:'Yone',235:'Senna',233:'Briar',99:'Lux'};
  function champNameById(id){ return CHID[id] || ''; }

  // 골드 추이 SVG
  function fmtT(s){ s=Math.max(0,s|0); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }

  // 규칙 기반 복기 분석 카드(녹화자 기준). 조언 문구는 여기서 자유롭게 튜닝.
  // 규칙 기반 복기 분석(녹화자 기준). 기준선은 국내외 코칭 데이터 기반 — 문구·수치 자유 튜닝.
  // 포지션별 코칭 가이드 — 사람이 영상으로 봐야 하는 영역(체크 질문)과 약점별 처방·훈련.
  // 출처: 코칭 평가 기준 문서(포지션별 리플레이 체크 질문 / 개선방안 / 추천 훈련 과제).
  var POS_GUIDE = {
    TOP:{ ko:'탑',
      checks:['첫 3웨이브를 상성에 맞게 설계했는가?','상대 정글이 안 보일 때 라인 위치를 조정했는가?','텔레포트를 킬 욕심이 아니라 웨이브·오브젝트 손익까지 보고 썼는가?','사이드에서 압박하다 팀이 싸울 수 있을 때 합류했는가?','불리한 매치업에서 CS·경험치 손실을 허용 범위로 제한했는가?'],
      drills:['상성별 1~4레벨 딜교환 타이밍 표 작성','텔레포트 사용 장면만 모아 성공/실패 원인 분류','14분 이후 사이드 데스 장면을 위치·시야·팀 턴 기준으로 재분류'],
      fix:{ farm:'첫 3웨이브 푸시/당김 기준을 매치업별로 익히세요. 연습에서 3:30까지 킬 없이 웨이브 위치만 평가합니다.',
        death:'사이드 진입 전 미드 라인·아군 정글·상대 텔/궁을 체크하세요. 미니맵에 3명 이상 안 보이면 다음 웨이브 욕심을 멈춥니다.',
        kp:'챔피언별 한타 임무를 한 문장으로 정하세요. 예: 오른은 궁으로 진입각, 잭스는 상대 원딜 점멸 빼기.',
        vision:'제어와드를 라인 위치와 정글 동선에 맞춰 강가·삼거리·상대 정글 입구 중 골라 박으세요.' } },
    JUNGLE:{ ko:'정글',
      checks:['첫 캠프 동선에 명확한 목적이 있었는가?','갱을 간 라인이 실제로 호응 가능한 웨이브였는가?','상대 정글 위치를 캠프 수·라인 반응·와드로 추적했는가?','용/전령 90초 전부터 귀환·시야·라인을 준비했는가?','실패한 갱 이후 손실을 최소화하는 다음 선택을 했는가?'],
      drills:['첫 6분 동선을 지도 위에 화살표로 기록','상대 정글 위치 예측을 30초 단위로 말하고 VOD로 검증','용/전령 전 90초 체크리스트 반복 훈련'],
      fix:{ farm:'경기 전 동선 3플랜(풀캠 성장·3캠 갱·상대 버프 카정)을 준비하고, 실패 시 어디로 전환할지 정하세요.',

    function sub(k,v,c){ return '<div class="substat '+(c||'')+'"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; }
    var sg=''; key.forEach(function(s){ sg+=sub(s.k,s.v,s.c); });
    if(!isSup && me.cs_per_min!=null && keyNames.indexOf('분당 CS')<0) sg+=sub('분당 CS',me.cs_per_min,me.cs_per_min>=csGood?'up':(me.cs_per_min<csFloor?'down':''));
    if(isLane && lane.mycs10!=null) sg+=sub('10분 CS',lane.mycs10,lane.mycs10>=80?'up':(lane.mycs10<60?'down':''));
    if(me.kp!=null && keyNames.indexOf('킬관여')<0) sg+=sub('킬관여',Math.round(me.kp*100)+'%',me.kp>=kpB+0.15?'up':(me.kp<kpB-0.15?'down':''));
    sg+=sub('시야/분',vspm!=null?vspm:'–',vspm!=null?(vspm>=visGood?'up':(vspm<visFloor?'down':'')):'');
    if(me.gold!=null && keyNames.indexOf('팀 딜 비중')<0 && me.gold>0) sg+=sub('골드',P.compact(me.gold),'');

    // good / bad
    var good=[], bad=[];
    function rx(k,fb){ return (guide&&guide.fix&&guide.fix[k])?guide.fix[k]:fb; }
    if(isLane && lane.mycs10!=null){
      if(lane.mycs10>=80) good.push(['파밍 우수','10분에 CS '+lane.mycs10+'개를 챙겼습니다. 라인 관리가 깔끔합니다.']);
      else if(lane.mycs10<60) bad.push(['CS 수급 부족','10분 CS '+lane.mycs10+'개로 70개 목표에 못 미칩니다. '+rx('farm','웨이브를 끝까지 정리하세요.')]);
    }
    if(isJg && me.cs_per_min!=null && me.cs_per_min>=csGood) good.push(['정글 수급 우수','분당 CS '+me.cs_per_min+'개. 정글 동선이 효율적입니다.']);
    if(!isSup && me.cs_per_min!=null && me.cs_per_min<csFloor) bad.push(['파밍 효율 저조','분당 CS '+me.cs_per_min+'개. '+rx('farm','빈 라인을 정리해 분당 '+csGood+'개 이상을 노리세요.')]);
    if(me.kda!=null && me.kda>=3 && (me.deaths==null||me.deaths<=4)) good.push(['안정적인 생존','KDA '+me.kda+'. 무리 없이 이득을 쌓았습니다.']);
    if(me.kp!=null){
      if(me.kp>=kpB+0.15) good.push(['높은 팀 기여','킬관여 '+Math.round(me.kp*100)+'%. 팀 교전에 꾸준히 함께했습니다.']);
      else if(me.kp<kpB-0.15) bad.push(['낮은 킬관여','킬관여 '+Math.round(me.kp*100)+'%. '+rx('kp','미니맵을 보며 교전 타이밍에 합류하세요.')]);
    }
    if(vspm!=null){
      if(vspm>=visGood) good.push(['시야 장악','분당 시야 '+vspm+'점. 맵 정보를 잘 만들었습니다.']);
      else if(vspm<visFloor) bad.push(['시야 관리 부족','분당 시야 '+vspm+'점. '+rx('vision','제어 와드를 꾸준히 사 적 동선을 미리 비추세요.')]);
    }
    good=good.concat(FI.good,DI.good,DMI.good,MA.good);
    bad=bad.concat(FI.bad,DI.bad,DMI.bad,MA.bad);
    function dedupe(a){ var s={},o=[]; a.forEach(function(x){ if(!s[x[0]]){s[x[0]]=1;o.push(x);} }); return o; }
    good=dedupe(good); bad=dedupe(bad);
    var PRI=['팀 내 최다 데스','라인전 단계 사망 과다','초반 동선 사망','연속으로 끊김','적 진영에서 잘림','후반 캐리 사망','초반에 벌어진 격차','라인전 크게 밀림','낮은 딜 비중','리드를 굳히지 못함','오브젝트를 내줌','시야 관리 부족','파밍 효율 저조','CS 수급 부족','낮은 킬관여'];
    bad.sort(function(a,b){ var ia=PRI.indexOf(a[0]); var ib=PRI.indexOf(b[0]); if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib; });
    var focus=pickFocus(bad);
    good=good.slice(0,4); bad=bad.slice(0,5);

    function evcol(title,arr,kind){
      var head='<div class="eh"><span class="dot"></span>'+title+'</div>';
      if(!arr.length) return '<div class="evalcol '+kind+'">'+head+'<div class="crow '+(kind==='good'?'g':'b')+'"><div class="ct"><div class="a" style="color:var(--faint)">'+(kind==='good'?'두드러진 강점이 기록되지 않았습니다.':'큰 약점이 없습니다. 좋은 흐름이에요.')+'</div></div></div></div>';
      var rows=arr.map(function(x){ return '<div class="crow '+(kind==='good'?'g':'b')+'"><div class="ico">'+(kind==='good'?'✓':'!')+'</div><div class="ct"><div class="t">'+esc(x[0])+'</div><div class="a">'+esc(x[1])+'</div></div></div>'; }).join('');
      return '<div class="evalcol '+kind+'">'+head+'<div class="ceval">'+rows+'</div></div>';
    }
    function p3(val,lo,hi){ return val==null?null:(val>=hi?2:(val<lo?0:1)); }
    var gp=[];
    if(!isSup) gp.push([isJg?1:(pos==='BOTTOM'?3:2),p3(me.cs_per_min,csFloor,csGood)]);
    if(isLane && lane.cs10!=null) gp.push([1,p3(lane.cs10,-10,10)]);
    if(me.kda!=null) gp.push([pos==='BOTTOM'?3:2,p3(me.kda,2,3)]);
    if(me.kp!=null) gp.push([(isJg||isSup)?3:(pos==='TOP'?1:2),p3(me.kp,kpB-0.1,kpB+0.1)]);
    if(vspm!=null) gp.push([isSup?3:(isJg?2:1),p3(vspm,visFloor,visGood)]);
    var gws=0,gss=0; gp.forEach(function(x){ if(x[1]!=null){ gws+=x[0]*2; gss+=x[0]*x[1]; } });
    var gradeHTML='';
    if(gws>0){
      var gscore=Math.round(gss/gws*100);
      var gl=gscore>=85?'S':(gscore>=70?'A':(gscore>=55?'B':(gscore>=40?'C':'D')));
      gradeHTML='<div class="grade g-'+gl.toLowerCase()+'"><div class="gv">'+gl+'</div><div class="gx"><div class="gs">'+gscore+'<span class="gsl"> / 100</span></div><div class="gd">측정 지표 종합 등급입니다. 의사결정·시야·웨이브 관리는 아래 항목으로 직접 확인하세요.</div></div></div>';
    }
    var focusHTML = focus ? '<div class="cfocus"><div class="cfl">이번 게임, 딱 하나만 고친다면</div><div class="cft"><b>'+esc(focus[0])+'</b> · '+esc(focus[1])+'</div></div>' : '';
    var checksHTML='',drillHTML='';
    if(guide){
      checksHTML='<div class="checks"><div class="chead">영상으로 직접 확인할 것 · '+guide.ko+'</div>';
      guide.checks.forEach(function(q){ checksHTML+='<div class="crq"><span class="qm">?</span><span>'+esc(q)+'</span></div>'; });
      checksHTML+='</div>';
      if(bad.length){
        drillHTML='<div class="drills"><div class="dhead">이번 주 훈련 과제</div>';
        guide.drills.slice(0,2).forEach(function(d){ drillHTML+='<div class="drow"><span class="dn">▸</span><span>'+esc(d)+'</span></div>'; });
        drillHTML+='</div>';
      }
    }
    return '<div class="coachhead"><span class="t">복기 분석</span><span class="s">'+(P.posKo(pos)||'내 플레이')+' 기준</span><span class="ln"></span></div>'
      +gradeHTML+focusHTML
      +(DI.flow||'')
      +(sg?'<div class="subgrid">'+sg+'</div>':'')
      +'<div class="evalcols">'+evcol('잘한 점',good,'good')+evcol('개선할 점',bad,'bad')+'</div>'
      +checksHTML+drillHTML;
  }

  // 데스/오브젝트 버튼 → 영상 점프(게임 시각 기준이라 영상과 약간 오차 가능)

  function goldChart(series){
    if(!series || series.length<2) return '';
    var W=1000, H=240, pad=8;
    var maxT = series[series.length-1].t || 1;
    var maxG = 1; series.forEach(function(s){ maxG=Math.max(maxG, s.g100, s.g200); });
    function x(t){ return pad + (t/maxT)*(W-2*pad); }
    function y(g){ return H-pad - (g/maxG)*(H-2*pad); }
    function path(key){ return series.map(function(s,i){ return (i?'L':'M')+x(s.t).toFixed(1)+' '+y(s[key]).toFixed(1); }).join(' '); }
    // 골드 차이 영역(블루-레드)
    var diffTop = series.map(function(s,i){ return (i?'L':'M')+x(s.t).toFixed(1)+' '+y(Math.max(s.g100,s.g200)).toFixed(1); }).join(' ');
    // x축 라벨(분)
    var ticks=''; var step = maxT>1800?600:300;
    for(var t=0;t<=maxT;t+=step){ ticks += '<text class="gx" x="'+x(t).toFixed(1)+'" y="'+(H-2)+'" text-anchor="middle">'+Math.round(t/60)+'분</text>'; }
    return '<div class="chartcard"><div class="lg"><span><i style="background:var(--blue)"></i>블루팀</span><span><i style="background:var(--red)"></i>레드팀</span><span style="margin-left:auto;color:var(--faint)">누적 획득 골드</span></div>'
      + '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'
      + '<path d="'+path('g100')+'" fill="none" stroke="var(--blue)" stroke-width="2.5"/>'
      + '<path d="'+path('g200')+'" fill="none" stroke="var(--red)" stroke-width="2.5"/>'
      + ticks + '</svg></div>';
  }

      + '<div class="track"><div class="fb" style="width:'+bp+'%"></div><div class="fr" style="width:'+(100-bp)+'%"></div><div class="lbl">'+icon+label+'</div></div>'

  function curT(){ var v=document.querySelector('#stagehost video'); return v?(v.currentTime||0):0; }

  function renderStage(){
    var host = document.getElementById('stagehost');
    if(!host) return;
    if(syncRAF){ cancelAnimationFrame(syncRAF); syncRAF=null; }
    var multi = split && selected.length>=2;
    host.innerHTML = multi ? (splitMode==='focus'?stageFocus():stageSplit()) : stageSingle();

      startSync();

        });

      var mv=document.querySelector('#stagehost video');
      if(mv){ var rt=resumeAt, seek=function(){ try{mv.currentTime=rt;}catch(_){} }; if(mv.readyState>=1) seek(); else mv.addEventListener('loadedmetadata',seek,{once:true}); }
      resumeAt=0;

  function switchPovInstant(i){
    var host=document.getElementById('stagehost'); if(!host) return;
    var pool=host.querySelector('.stage.pool'); if(!pool){ curPov=i; renderStage(); return; }
    var vids=pool.querySelectorAll('.pvid');
    var cur=pool.querySelector('.pvid.on');
    var t=cur?(cur.currentTime||0):0, playing=cur?!cur.paused:false;
    curPov=i;
    var target=pool.querySelector('.pvid[data-pv="'+i+'"]');
    for(var k=0;k<vids.length;k++){ var v=vids[k]; if(v!==target){ try{v.pause();}catch(_){} v.classList.remove('on'); v.removeAttribute('controls'); v.muted=true; } }
    var ov=pool.querySelector('.poolempty');
    if(target){
      if(ov) ov.classList.remove('on');
      target.classList.add('on'); target.setAttribute('controls',''); target.muted=false;
      try{ target.currentTime=t; }catch(_){}
      if(playing){ var pr=target.play(); if(pr&&pr.catch) pr.catch(function(){}); }
    } else if(ov){ ov.classList.add('on'); }
  }
  function startSync(){
    var vids = Array.prototype.slice.call(document.querySelectorAll('#stagehost video'));
    if(vids.length<2) return;
    var master = vids[0];
    master.addEventListener('play', function(){ vids.forEach(function(v){ if(v!==master) v.play().catch(function(){}); }); });
    master.addEventListener('pause', function(){ vids.forEach(function(v){ if(v!==master) v.pause(); }); });
    master.addEventListener('seeked', function(){ vids.forEach(function(v){ if(v!==master) v.currentTime=master.currentTime; }); });
    function loop(){
      vids.forEach(function(v){ if(v!==master && Math.abs(v.currentTime-master.currentTime)>0.35){ v.currentTime=master.currentTime; } });
      syncRAF = requestAnimationFrame(loop);
    }
    syncRAF = requestAnimationFrame(loop);
  }

  function bindPov(){
    var host = document.getElementById('povhost');
    if(!host) return;
    host.addEventListener('click', function(e){
      var lm = e.target.closest('[data-lm]');
      if(lm){ resumeAt = curT(); splitMode = lm.dataset.lm; renderPovBar(); renderStage(); return; }

        else { selected = []; }

      var tab = e.target.closest('.povtab'); if(!tab) return;
      var i = +tab.dataset.idx;
      if(split){
        var pos = selected.indexOf(i);
        if(pos>=0){ if(selected.length>1) selected.splice(pos,1); }
        else if(selected.length<4 && ROWS[i].video){ selected.push(i); }
        renderPovBar(); renderStage();
      } else {
        switchPovInstant(i); renderPovBar(); renderAnalysis();
      }
    });
  }

  // ── 좋아요/조회/댓글 (match_id 그룹 단위) ──
  function groupLikes(){ return STAT.likes||0; }
  function groupViews(){ return STAT.views||0; }

  async function bumpView(){ if(!MID) return; try{ await P.viewGroup(MID); }catch(e){} }
  var liked = false;
  async function toggleLike(btn){
    if(!MID) return;
    liked = !liked;
    try{ var res = await P.likeGroup(MID, liked?1:-1); var lk = Array.isArray(res)?res[0]:res; if(typeof lk==='number') STAT.likes = lk; }
    catch(e){ STAT.likes = Math.max(0,(STAT.likes||0) + (liked?1:-1)); }
    btn.classList.toggle('liked', liked);
    btn.querySelector('.cnt').textContent = STAT.likes;
  }

  async function loadComments(){
    var host = document.getElementById('clist'); if(!host) return;
    var rows=[];
    try{ rows = await P.sbSelect('comments','select=*&match_id=eq.'+encodeURIComponent(MID)+'&order=created.desc&limit=100'); }catch(e){}
    if(!rows.length){ host.innerHTML='<div class="cempty">첫 댓글을 남겨보세요.</div>'; return; }
    host.innerHTML = rows.map(function(c){
      return '<div class="citem"><div class="ch"><span class="ca">'+esc(c.author||'익명')+'</span><span class="ct">'+(P.ago(c.created)||'')+'</span></div><div class="cb">'+esc(c.body)+'</div></div>';
    }).join('');
  }
  async function postComment(){
    var ai=document.getElementById('cauthor'), bi=document.getElementById('cbody');
    var author=(ai.value||'익명').trim(), body=(bi.value||'').trim();
    if(!body) return;
    try{
      await P.sbInsert('comments',{match_id:MID, author:author, body:body, created:new Date().toISOString()});
      bi.value=''; loadComments();
    }catch(e){ alert('댓글 등록에 실패했습니다.'); }
  }

  function likeBtnHTML(){ return '<button class="actbtn like" id="likebtn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.2 4 2.4.8-1.2 2-2.4 4-2.4 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"/></svg><span class="cnt">'+groupLikes()+'</span></button>'; }
  function viewHTML(){ return '<div class="actbtn view"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/></svg>'+P.compact(groupViews())+'</div>'; }

  function verdictLine(me, won){
    var lane=me.lane||{}, pos=me.position||'';
    var isLane=pos!=='JUNGLE'&&pos!=='UTILITY';
    var key;
    if(isLane && lane.cs10!=null && lane.cs10>=15) key='라인전을 강하게 지배한';
    else if(isLane && lane.cs10!=null && lane.cs10>=10) key='라인전 우위를 잡은';
    else if(isLane && lane.cs10!=null && lane.cs10<=-10) key='라인전이 밀린';
    else if(me.deaths!=null && me.deaths>=8) key='교전에서 자주 끊긴';
    else if(me.kda!=null && me.kda>=4) key='안정적으로 풀어간';
    else if(me.kp!=null && me.kp>=0.6) key='팀 교전을 주도한';
    else key='무난하게 흘러간';
    var tail = won===true?' 경기입니다. 강점을 유지해 보세요.':(won===false?' 경기입니다. 아래 개선점을 짚어 보세요.':' 경기입니다.');
    return key+tail;
  }

  function heroBlock(rep, won){
    var saver=(ROWS[curPov]||{}).saver;
    var players=ANALYSIS.players||[];
    var me=null, i;
    for(i=0;i<players.length;i++){ if(players[i].name===saver){ me=players[i]; break; } }
    var verdict = won===true?'승리':(won===false?'패배':'결과');
    var wl = won===true?'w':(won===false?'l':'u');
    var len = rep.length || P.mmss(ANALYSIS.duration);
    var queue = P.queueName(rep.type||ANALYSIS.queue);
    var date = P.ago(rep.uploaded)||'-';
    var meta = '<div class="hmeta"><div class="si"><div class="k">큐</div><div class="v">'+queue+'</div></div>'
      +'<div class="si"><div class="k">시간</div><div class="v">'+len+'</div></div>'
      +'<div class="si"><div class="k">날짜</div><div class="v">'+date+'</div></div></div>';
    var side = '<div class="hside"><div class="wlbadge '+wl+'">'+verdict+'</div>'+meta+'<div class="hacts">'+likeBtnHTML()+viewHTML()+'</div></div>';
    if(!me){
      return '<div class="hero '+wl+'"><div class="hchamp"><div class="ci"></div><div><div class="nm">경기 기록</div></div></div>'
        +'<div class="hmid"><div class="vsum">분석 정보가 없는 경기입니다. 영상으로 다시 볼 수 있습니다.</div></div>'+side+'</div>';
    }
    var champ=me.champion||'', pos=P.posKo(me.position)||'';
    var kda=P.kdaRatio(me.kills,me.deaths,me.assists);
    return '<div class="hero '+wl+'">'
      +'<div class="hchamp"><div class="ci"><img src="'+P.champIcon(ver,champ)+'" alt="'+esc(champ)+'" onerror="this.style.visibility=\'hidden\'"><span class="lv">'+(me.level||'')+'</span></div>'
        +'<div><div class="nm">'+esc(champ)+'</div>'+(pos?'<div class="po">'+pos+'</div>':'')+'</div></div>'
      +'<div class="hmid"><div class="hkda"><div class="v">'+(me.kills||0)+'<span class="s">/</span>'+(me.deaths||0)+'<span class="s">/</span>'+(me.assists||0)+'</div><div class="r">KDA '+kda+'</div></div>'
        +'<div class="vsum">'+verdictLine(me,won)+'</div></div>'
      +side+'</div>';
  }

  function jumpsBlock(){
    var saver=(ROWS[curPov]||{}).saver;
    var players=ANALYSIS.players||[];
    var meIdx=-1, i;
    for(i=0;i<players.length;i++){ if(players[i].name===saver){ meIdx=i; break; } }
    var jp='';
    if(meIdx>=0){
      var pid=meIdx+1;
      var myDeaths=(ANALYSIS.kills||[]).filter(function(e){ return e.victim===pid; });
      if(myDeaths.length){
        jp+='<div class="clabel">내 데스 '+myDeaths.length+'회 · 클릭하면 영상으로</div><div class="jumps">';
        myDeaths.forEach(function(e){ jp+='<button class="jbtn death" data-jump="'+e.t+'">'+fmtT(e.t)+'</button>'; });
        jp+='</div>';
      }
    }
    var objs=ANALYSIS.objs||[];
    if(objs.length){
      jp+='<div class="clabel">주요 오브젝트</div><div class="jumps">';
      objs.forEach(function(e){
        var nm=e.kind==='DRAGON'?'용':(e.kind==='BARON_NASHOR'?'바론':(e.kind==='RIFTHERALD'?'전령':(e.kind==='TOWER'?'타워':e.kind)));
        jp+='<button class="jbtn" data-jump="'+e.t+'">'+fmtT(e.t)+' '+nm+'</button>';
      });
      jp+='</div>';
    }
    return jp ? '<div class="vjumps">'+jp+'</div>' : '';
  }

  function renderAll(){
    var rep = ROWS[curPov] || P.pickPrimary(ROWS) || {};
    var won = ANALYSIS.win_team!=null ? (saverWon(rep)) : null;
    var len = rep.length || P.mmss(ANALYSIS.duration);
    var patch = (ANALYSIS.patch||'').split('.').slice(0,2).join('.');
    var verdict = won===true?'승리':won===false?'패배':'결과';

    main.innerHTML =
      '<div id="herohost">'+heroBlock(rep, won)+'</div>'
      + '<h2 class="sec">다시 보기<span class="ln"></span></h2>'
      + '<div class="player"><div id="stagehost"></div><div class="povbar" id="povhost"></div></div>'
      + '<div id="anahost">'+jumpsBlock()+coachCard(rep)+'</div>'
      + (ANALYSIS.series ? ('<h2 class="sec">골드 추이<span class="ln"></span></h2>'+goldChart(ANALYSIS.series)) : '')
      + '<h2 class="sec">오브젝트<span class="ln"></span></h2>'+objectivesBlock()
      + '<h2 class="sec">스코어보드<span class="ln"></span></h2><div class="board">'+teamBlock(100)+teamBlock(200)+'</div>'
      + '<h2 class="sec">댓글<span class="ln"></span></h2>'
      + '<div class="cmts"><div class="cform"><input id="cauthor" placeholder="이름(선택)" maxlength="24"><input id="cbody" placeholder="댓글을 입력하세요" maxlength="300"><button id="cpost">등록</button></div><div class="clist" id="clist"></div></div>';

    renderStage(); renderPovBar(); bindPov(); runCounts();
    document.getElementById('likebtn').addEventListener('click', function(){ toggleLike(this); });
    document.getElementById('cpost').addEventListener('click', postComment);
    document.getElementById('cbody').addEventListener('keydown', function(e){ if(e.key==='Enter') postComment(); });
    loadComments();
  }

  function renderAnalysis(){
    var rep = ROWS[curPov] || P.pickPrimary(ROWS) || {};
    var won = (ANALYSIS && ANALYSIS.win_team!=null) ? saverWon(rep) : null;
    var hh = document.getElementById('herohost'); if(hh) hh.innerHTML = heroBlock(rep, won);
    var ah = document.getElementById('anahost'); if(ah) ah.innerHTML = jumpsBlock() + coachCard(rep);
    var lb = document.getElementById('likebtn'); if(lb){ if(liked) lb.classList.add('liked'); lb.addEventListener('click', function(){ toggleLike(this); }); }
    runCounts();
  }

  var _countObs = null;
  function countUp(el){
    var txt = (el.textContent||'').trim();
    var m = txt.match(/^([^\d]*)([\d][\d,]*(?:\.\d+)?)(.*)$/);
    if(!m) return;
    var pre=m[1], numS=m[2], suf=m[3], hasC=numS.indexOf(',')>=0, dec=(numS.split('.')[1]||'').length, target=parseFloat(numS.replace(/,/g,''));
    if(!isFinite(target)) return;
    function fmt(v){ var s; if(hasC){ s=Number(dec?v.toFixed(dec):Math.round(v)).toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); } else { s=dec?v.toFixed(dec):String(Math.round(v)); } return pre+s+suf; }
    var st=null;
    function step(ts){ if(st==null) st=ts; var p=Math.min(1,(ts-st)/850), e=1-Math.pow(1-p,3); if(p<1){ el.textContent=fmt(target*e); requestAnimationFrame(step); } else { el.textContent=pre+numS+suf; } }
    el.textContent=fmt(0); requestAnimationFrame(step);
  }
  function runCounts(){
    if(typeof IntersectionObserver==='undefined') return;
    if(_countObs) _countObs.disconnect();
    _countObs = new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ countUp(e.target); _countObs.unobserve(e.target); } }); }, {threshold:.4});
    var els = document.querySelectorAll('#anahost .substat .v'); for(var i=0;i<els.length;i++) _countObs.observe(els[i]);
  }

  function saverWon(rep){
    if(rep && rep.won!=null) return rep.won;
    var c=P.saverCard(rep); return c?!!c.win:(ANALYSIS.win_team===100?null:null);
  }

  async function load(){
    MID = qs('id') || '';
    if(!MID){ main.innerHTML='<div class="state"><h3>매치를 찾을 수 없습니다</h3><p><a href="index.html">목록으로 돌아가기</a></p></div>'; return; }
    try{ ver = await P.ddVersion(); }catch(e){}
    try{ await P.ddChampMap(ver); }catch(e){}
    var rows;
    try{ rows = await P.sbSelect('matches','select=*&match_id=eq.'+encodeURIComponent(MID)+'&order=uploaded.desc'); }
    catch(e){ main.innerHTML='<div class="state"><h3>불러오지 못했습니다</h3><p>잠시 후 다시 시도해 주세요.</p></div>'; return; }
    if(!rows || !rows.length){
      main.innerHTML='<div class="state"><svg class="mk" viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z" fill="currentColor"/></svg><h3>매치를 찾을 수 없습니다</h3><p>삭제되었거나 아직 업로드되지 않았을 수 있습니다. <a href="index.html">목록으로</a></p></div>';
      return;
    }
    ROWS = rows;
    try{ STAT = await P.statsOne(MID); }catch(e){ STAT = {likes:0, views:0}; }
    // 분석은 영상 있는 대표 우선, 없으면 첫 행
    var rep = P.pickPrimary(ROWS) || ROWS[0];
    ANALYSIS = rep.analysis || {};
    // 각 행에 _team(녹화자 팀) 부착(분할 태그 색)
    ROWS.forEach(function(r){ var c=P.saverCard(r); r._team = c?c.team:100; });
    // 대표를 curPov로
    curPov = Math.max(0, ROWS.indexOf(rep));
    renderAll();
    bumpView();
  }

  load();
})();
</script>
</body></html>
